const DAYS = [
  {day:1,pillar:"Foundation",pillarColor:"#5A4A3A",en:{title:"Why You're Here",opener:"You didn't open this app by accident. Something brought you here — a decision, a moment, a version of yourself you're tired of. That's enough. Let's start there.",lesson:`Most people who struggle with alcohol don't think of themselves as having a problem. They think everyone drinks like this. They think they could stop if they really wanted to. They think it's just how they unwind.\n\nAnd maybe some of that is true. But here's what's also true: you're here. Reading this. At whatever hour this is, in whatever situation you're in.\n\nThat means something shifted. Something in you said: this isn't working.\n\nThis guide is not going to diagnose you. It's not going to tell you you're an alcoholic or put a label on you. That's not what this is.\n\nWhat this is: 30 days of education, reflection, and action. It's designed to help you understand yourself better — your patterns, your triggers, your identity, your purpose — so that whatever decision you make going forward, you make it from a position of clarity, not confusion.\n\n**The decision is always yours. This guide just makes sure you're making it with your eyes open.**\n\nSome days will be uncomfortable. That's not a malfunction. That's the work. Those who get something out of this are the ones who show up on the uncomfortable days too.\n\nYou don't have to be ready. You just have to be here.`,reflection:"Why did you actually open this? Not the surface answer — the real one. What are you tired of?",activity:{title:"Write Your Honest Why",steps:["Open your notes app or grab a pen. Write for 5 minutes uninterrupted.","Finish this sentence as many times as you can: 'I'm here because ___.'","Don't filter it. Don't make it sound good. Write what's actually true.","Read it back. Underline the one sentence that hits hardest.","That sentence is your anchor for the next 30 days. Keep it somewhere you'll see it."]},closer:"Tomorrow we go deeper. You don't need to feel anything in particular tonight. Just know that showing up today counted."},sw:{title:"Kwa Nini Uko Hapa",opener:"Hukufungua programu hii kwa bahati. Kitu kilikukuleta hapa — uamuzi, wakati, toleo la wewe mwenyewe ambalo umechoka nazo. Hiyo inatosha.",lesson:`Wengi wanaopigana na pombe hawajioni kama wana tatizo. Wanafikiri kila mtu anakunywa hivyo.\n\nLakini hapa pia kuna ukweli: uko hapa. Unasoma hili. Hiyo inamaanisha kitu kimebadilika.\n\nProgramu hii haitakutambulia. Haitakuambia wewe ni mlevi au kukupa lebo. Hiyo si hii.\n\nHii ni nini: siku 30 za elimu, tafakari, na hatua. Imeundwa kukusaidia kujielewa vizuri zaidi.\n\n**Uamuzi ni wako daima. Programu hii inahakikisha tu kwamba unaufanya macho wazi.**`,reflection:"Kwa nini ulifungua hili kweli? Si jibu la juu — la kweli. Umechoka na nini?",activity:{title:"Andika Kwa Nini Yako ya Kweli",steps:["Fungua programu ya kumbukumbu au chukua kalamu. Andika kwa dakika 5 bila kuacha.","Kamilisha sentensi hii mara nyingi iwezekanavyo: 'Niko hapa kwa sababu ___.'","Usichuje. Usifanye ionekane nzuri. Andika kile ambacho ni kweli.","Soma tena. Pigia mstari sentensi moja inayogonga zaidi.","Sentensi hiyo ndiyo nanga yako kwa siku 30 zijazo."]},closer:"Kesho tutaenda kina zaidi. Jua tu kwamba kuja leo kulihesabiwa."}},
  {day:2,pillar:"Foundation",pillarColor:"#5A4A3A",en:{title:"What This Is — And What It Isn't",opener:"Before we go any further, let's be straight about what you've signed up for.",lesson:`This is not a 12-step program. No sponsor. No meetings. No requirement to stand up in a room and say "I am an alcoholic."\n\nThis is not therapy. No diagnosis. No prescription.\n\nThis is not a detox plan. If you're physically dependent on alcohol, you need medical support — this program doesn't replace it.\n\n**What this is:**\n\nA 30-day education in yourself. Six pillars. Identity. Clarity. Discipline. Purpose. Connection. Freedom.\n\nEach pillar is a lens for understanding why alcohol has had the role it's had. Not to blame you. Not to fix you. To equip you.\n\nThe philosophy: people who understand themselves make better decisions. Full stop.\n\nYou don't need to commit to anything beyond today. The decision will emerge from the work — if you do the work.\n\n**Those who get the most from this are not the ones who were ready. They're the ones who kept going anyway.**`,reflection:"What are you actually willing to commit to for the next 30 days? Be honest — not aspirational.",activity:{title:"Set Your Commitment",steps:["Write down the specific time of day you'll do this program. Be exact.","Write what you'll do on the days you don't feel like it. Because those days are coming.","Tell one person you trust that you're doing something for yourself for the next 30 days.","Set a daily reminder on your phone for your chosen time.","That's your commitment made. Simple. Real."]},closer:"Tomorrow we start the real work. First pillar: Identity. Who are you without the drink?"},sw:{title:"Hii Ni Nini — Na Hii Si Nini",opener:"Kabla hatujaenda mbele zaidi, tuwe wazi kuhusu ulichojisajili.",lesson:`Hii si programu ya hatua 12. Hakuna mshauri. Hakuna mikutano.\n\nHii si tiba. Hakuna utambuzi.\n\n**Hii ni nini:**\n\nElimua ya siku 30 ndani yako mwenyewe. Nguzo sita. Utambulisho. Uwazi. Nidhamu. Kusudi. Uhusiano. Uhuru.\n\nFalsafa: mtu anayejielewa hufanya maamuzi bora. Ukweli huo.\n\n**Wanaopata zaidi kutoka hapa si wale waliokuwa tayari. Ni wale walioendela hata hivyo.**`,reflection:"Unaweza kweli kujitolea nini kwa siku 30 zijazo? Kuwa mkweli — si wa matarajio.",activity:{title:"Weka Ahadi Yako",steps:["Andika wakati maalum wa siku utakaofanya programu hii. Kuwa sahihi.","Andika utakachofanya siku hujisikii hivyo.","Mwambie mtu mmoja unayemwamini kwamba unafanya kitu kwa ajili yako mwenyewe.","Weka ukumbusho wa kila siku kwenye simu yako.","Hiyo ndiyo ahadi yako iliyofanywa."]},closer:"Kesho tunaanza kazi halisi. Nguzo ya kwanza: Utambulisho."}},
  {day:3,pillar:"Foundation",pillarColor:"#5A4A3A",en:{title:"The Substitution Trap",opener:"Before the pillars begin — one concept you need to carry through all 30 days. It could save you years.",lesson:`Here's what most sobriety programs never tell you:\n\nYou can stop drinking and still not be free.\n\nThis is called the substitution trap. When someone removes alcohol without dealing with what was underneath — the shame, the boredom, the anxiety — the brain doesn't stop needing an escape. It just finds a new one.\n\nWork. Pornography. Food. Rage. Gambling. These aren't always problems. But when they start doing the same job alcohol was doing — numbing, escaping — you haven't gotten free. You've just changed rooms in the same prison.\n\n**The six pillars are not about quitting drinking. They are about understanding yourself deeply enough that the drink stops being necessary.**\n\nSober and free are not the same thing. This guide is trying to get you to free.`,reflection:"Outside of alcohol — what else do you use to escape or numb? Work? Food? Anger? Phone? Be completely honest.",activity:{title:"Map Your Other Escapes",steps:["List every escape mechanism you use — not just alcohol.","For each one, rate it: Has this increased recently? (Yes / No / Maybe)","Circle the ones marked Yes.","For each circled item, write: 'When I do this, I'm usually avoiding the feeling of ___.'","This is your substitution map. You'll come back to it at Day 27."]},closer:"Foundation is done. Tomorrow: Identity. Who are you when nobody's watching?"},sw:{title:"Mtego wa Uingizwaji",opener:"Kabla nguzo hazijaanza — dhana moja unayohitaji kubeba nawe katika siku 30 zote.",lesson:`Hapa kuna kitu ambacho programu nyingi za ulevi hazikuambie kamwe:\n\nUnaweza kuacha kunywa na bado usikuwe huru.\n\nHii inaitwa mtego wa uingizwaji. Mtu anapotoa pombe bila kushughulikia kilichokuwa chini yake — aibu, uchovu, wasiwasi — ubongo wake hausi kuhitaji kutoroka. Unapata mpya tu.\n\n**Nguzo sita si kuhusu kuacha kunywa. Ni kuhusu kujielewa kwa kina vya kutosha hadi kinywaji kiache kuwa muhimu.**\n\nMwenye ulevi na huru si kitu kimoja.`,reflection:"Nje ya pombe — unatumia nini kingine kutoroka? Kazi? Chakula? Hasira? Kuwa mkweli kabisa.",activity:{title:"Chora Kutoroka Kwako Kingine",steps:["Orodhesha kila utaratibu wa kutoroka unaoumia — si pombe tu.","Kwa kila moja, pima: Je, hii imeongezeka hivi karibuni?","Zungushia zilizopigwa Ndio.","Kwa kila kipengele kilichozungushiwa, andika: 'Ninapofanya hili, kawaida ninaepuka hisia ya ___.'","Hifadhi hili. Utarudi kwake Siku ya 27."]},closer:"Msingi umekamilika. Kesho: Utambulisho."}},
  {day:4,pillar:"Identity",pillarColor:"#8B2020",en:{title:"The Job Alcohol Was Doing",opener:"Identity week starts today. This is the heaviest pillar. Don't rush it.",lesson:`Alcohol doesn't show up in your life randomly. It gets hired.\n\nSomething in your life needed doing — relief, confidence, belonging, numbness — and alcohol applied for the job. And it got it, because it worked. At least at first.\n\nFor some, it was the social lubricant. The thing that made conversation easy. For others, the painkiller. The thing that turned off the noise after a hard day.\n\nFor many, it became the identity itself. "I'm the guy who can hold his drink." It was how people knew them. How they knew themselves.\n\n**None of this is weakness. This is human. The problem is not that you found something that worked. The problem is that it started running the show.**\n\nRemoving alcohol without understanding the job it was doing leaves a gap. And something will fill that gap. The question this week: what are you going to put there instead?`,reflection:"What was the first 'job' alcohol did for you? Social ease? Pain relief? Belonging? Be specific about when it started working for you.",activity:{title:"The Job Description",steps:["Write at the top: 'Alcohol was hired to do the following job for me:'","Then write everything. All the jobs. The social one. The emotional one. Don't judge any of it.","Now write: 'The version of me that needed those jobs done was someone who ___.'","Ask yourself: Does that version still exist? Do those jobs still need doing?","Keep this. You'll need it at the end of the week."]},closer:"You started the hardest pillar today. Tomorrow we go deeper."},sw:{title:"Kazi Ambayo Pombe Ilifanya",opener:"Wiki ya Utambulisho inaanza leo. Hii ndiyo nguzo nzito zaidi. Usifanye haraka.",lesson:`Pombe haitokei katika maisha ya mtu bila mpango. Inaajiriwa.\n\nKitu katika maisha yako kilihitaji kufanywa — unafuu, ujasiri, kukubalika — na pombe iliomba kazi. Na ikaipata, kwa sababu ilifanya kazi.\n\nKwa wengine, ilikuwa mlaini wa kijamii. Kwa wengine, dawa ya maumivu. Kwa wengi, ikawa utambulisho wenyewe.\n\n**Hii yote si udhaifu. Hii ni kibinadamu. Tatizo ni kwamba ilianza kuendesha mchezo.**`,reflection:"'Kazi' ya kwanza pombe ilifanya kwa ajili yako ilikuwa gani? Kuwa maalum.",activity:{title:"Maelezo ya Kazi",steps:["Andika juu: 'Pombe iliajiriwa kufanya kazi ifuatayo kwa ajili yangu:'","Kisha andika kila kitu. Kazi zote. Ya kijamii. Ya kihisia.","Sasa andika: 'Mtu aliyehitaji kazi hizo kufanywa alikuwa mtu ambaye ___.'","Jiulize: Je, mtu huyo bado yupo?","Hifadhi hili. Utaihitaji mwishoni mwa wiki."]},closer:"Ulianza nguzo ngumu zaidi leo. Kesho tutaenda kina zaidi."}},
  {day:5,pillar:"Identity",pillarColor:"#8B2020",en:{title:"Stripping the Label",opener:"Yesterday you looked at what alcohol was doing. Today we look at what it was covering.",lesson:`Most recovery programs trade one label for another. You stop being "the guy who drinks" and become "the recovering alcoholic." Your identity is still organized around alcohol — just in the opposite direction.\n\nThat's still outsourcing who you are.\n\nThe work of this pillar is not to become the sober person. It's to become yourself — fully. With all the complexity, contradictions, and capacity that's always been there.\n\nYour identity should be built around what you value, what you're building, who you're responsible for — not around what you do or don't consume.\n\n**That version of you — the one underneath all the noise — is what this week is about.**`,reflection:"If you removed every label connected to alcohol — drinker, non-drinker, recovering, sober — who are you? What actually defines you?",activity:{title:"Build the Real You",steps:["Write 10 things you value — things that matter regardless of whether you drink.","Write 5 things you're responsible for.","Write 3 things you're building — even if they're just ideas.","Look at that list. That's closer to who you actually are than any label.","Write one sentence: 'I am someone who ___.' Not about sobriety. About who you are."]},closer:"The label starts to loosen when you have something to replace it with."},sw:{title:"Kuondoa Lebo",opener:"Jana uliangalia pombe ilichokuwa ikifanya. Leo tunaangalia ilichokuwa ikiifunika.",lesson:`Programu nyingi za uponyaji zinabadilishana lebo moja na nyingine. Unaacha kuwa "yule mtu anayekunywa" na unakuwa "mtu anayepona." Utambulisho wako bado unaandaliwa kuzunguka pombe.\n\nKazi ya nguzo hii si kuwa mtu mwenye ulevi. Ni kuwa mtu — kipindi.\n\n**Mtu huyo — yule aliye chini ya kelele zote — ndiyo wiki hii inayohusu.**`,reflection:"Kama uliondoa kila lebo inayohusiana na pombe — wewe ni nani? Ni nini kinachokufafanua kweli?",activity:{title:"Jenga Mtu wa Ndani",steps:["Andika mambo 10 unayoyathamini.","Andika mambo 5 una jukumu lake.","Andika mambo 3 unayojenga.","Angalia orodha hiyo. Hiyo ni karibu zaidi na wewe hasa kuliko lebo yoyote.","Andika sentensi moja: 'Mimi ni mtu ambaye ___.'"]},closer:"Lebo inaanza kulegea unapokuwa na kitu cha kuibadilisha nacho."}},
  {day:6,pillar:"Identity",pillarColor:"#8B2020",en:{title:"The Performance",opener:"Today we talk about something most people carry but almost none talk about: the exhaustion of performing.",lesson:`There's a version of you that shows up for the world. Capable. Composed. Handling it. Strong enough for everyone else.\n\nAnd then there's the real version.\n\nMost people have a significant gap between those two versions. The performance of the first one is exhausting. And alcohol was one of the few places that gap closed.\n\nWhat this guide isn't going to ask you to do: expose yourself or perform vulnerability for an audience. That's just a different kind of performance.\n\nWhat it is going to ask: find at least one context where the performance is not required. Where you can just exist, doing the work of your life.\n\n**The work this week is not just understanding your identity. It's giving your real self somewhere to exist.**`,reflection:"What version of yourself are you most tired of performing? Where does the mask feel heaviest?",activity:{title:"Drop the Performance — For 10 Minutes",steps:["Find somewhere private. Phone face down. 10 minutes.","Write without performing. No good sentences. No structure. Just what's actually true right now.","Start with: 'The thing I'm most tired of pretending is ___.'","Keep writing. Let it get messy. That's the point.","When 10 minutes is up, don't read it back yet. Just close it."]},closer:"Performance is exhausting. You just got 10 minutes off."},sw:{title:"Utendaji",opener:"Leo tunazungumza kuhusu kitu ambacho wengi hubeba lakini karibu hakuna anayezungumza: uchovu wa kuigiza.",lesson:`Kuna toleo lako ambalo linaonekana kwa ulimwengu. Mwenye uwezo. Ametulia. Mwenye nguvu kwa kila mtu mwingine.\n\nNa kisha kuna toleo halisi.\n\n**Kazi ya wiki hii si kuelewa utambulisho wako tu. Ni kumpa nafsi yako halisi mahali pa kuwepo.**`,reflection:"Toleo gani la wewe mwenyewe umechoka zaidi kuliigiza?",activity:{title:"Acha Utendaji — Kwa Dakika 10",steps:["Pata mahali pa faragha. Simu uso chini. Dakika 10.","Andika bila kuigiza. Kile ambacho ni kweli sasa hivi tu.","Anza na: 'Kitu ambacho nimechoka zaidi kujionyesha ni ___.'","Endelea kuandika. Acha iwe chafu.","Dakika 10 zinapoisha, funga tu."]},closer:"Utendaji unachoshea. Umepata dakika 10 mbali."}},
  {day:7,pillar:"Identity",pillarColor:"#8B2020",en:{title:"Who You Were Before",opener:"Four days into the hardest pillar. Today we go back — before the habit formed.",lesson:`Before alcohol became regular, there was a version of you with a particular way of moving through the world. With things you were interested in. Things that gave you energy without needing a substance.\n\nThat version didn't disappear. It got quieter. Buried under years of coping, performing, numbing. But it's still there.\n\n**Identity work in recovery is archaeology, not architecture.**\n\nYou're not constructing something new. You're carefully removing what covered the original — until you get back to what was actually there.\n\nWhat was there? What did you care about before the habit took over?`,reflection:"Who were you at 18 or 20 — before the drinking became a habit? What did you care about?",activity:{title:"Archaeological Dig",steps:["Think back to before the drinking habit formed. Write about who you were.","What were you interested in? What made you feel capable and alive?","What did you want your life to look like back then?","Which of those things are still available to you? Which did you abandon?","Pick one thing you want to reclaim. Write what a small version of reclaiming it looks like."]},closer:"That version of you isn't new. It's been there. Tomorrow we figure out what it needs."},sw:{title:"Ulikuwa Nani Kabla",opener:"Siku nne ndani ya nguzo ngumu zaidi. Leo tunarudi nyuma.",lesson:`Kabla pombe haijawa jambo la kawaida, kulikuwa na mtu mwenye njia fulani ya kusogea duniani. Alikuwa na mambo aliyoyapenda. Mambo yaliyompa nishati bila kuhitaji dutu.\n\nMtu huyo hakutoweka. Alikuwa kimya zaidi.\n\n**Kazi ya utambulisho katika uponyaji ni akiolojia, si usanifu.**`,reflection:"Ulikuwa nani ukiwa na miaka 18 au 20? Aliyajaliya nini?",activity:{title:"Uchimbaji wa Akiolojia",steps:["Fikiria nyuma kabla ya tabia ya kunywa haijaundwa. Andika kuhusu ulikuwa nani.","Ulipendezwa na nini? Kilikufanya ujisikie na uwezo?","Ulitaka maisha yako yalionekana vipi?","Ni zipi bado zinapatikana kwako?","Chagua kitu kimoja unachotaka kudai tena."]},closer:"Mtu unayemjenga si mpya. Amekuwepo."}},
  {day:8,pillar:"Identity",pillarColor:"#8B2020",en:{title:"Identity Week: Integration",opener:"Last day of Identity week. Today we bring it together.",lesson:`This week you've done hard work: you looked at the job alcohol was doing, started stripping the labels, examined the performance, went back and found who you were before.\n\nFive days of looking at yourself honestly. Most people never do that once.\n\nIdentity doesn't change in a week. But it can start changing — with the right questions, the right honesty, and the right daily practice.\n\n**You've started that process. Next week, we get into Clarity — understanding your patterns so you can actually interrupt them.**`,reflection:"After this week — what's the most honest thing you can say about who you are right now?",activity:{title:"Identity Statement — Current Draft",steps:["Review everything you wrote this week. Take 5 minutes.","Write 'I am someone who ___' — complete it 5 times. Each one should be true right now.","Pick the one that feels most honest and most uncomfortable. That's the real one.","Write it somewhere permanent. You'll revisit it at Day 30.","Identity week is done. Rest in that."]},closer:"Next week: Clarity. Now we look at what drives your patterns — and how to interrupt them."},sw:{title:"Wiki ya Utambulisho: Muunganiko",opener:"Siku ya mwisho ya wiki ya Utambulisho. Leo tunaleta pamoja.",lesson:`Wiki hii umefanya kazi ngumu. Uliangalia kazi pombe ilichokuwa ikifanya. Ulianza kuondoa lebo. Ulichunguza utendaji. Ulirudi na kupata ulikuwa nani kabla.\n\nSiku tano za kujiangalia kwa uaminifu. Watu wengi hawafanyi hiyo hata mara moja.\n\n**Umesimamisha mchakato huo. Wiki ijayo: Uwazi.**`,reflection:"Baada ya wiki hii — ni nini la uaminifu zaidi unaloweza kusema kuhusu wewe ni nani sasa hivi?",activity:{title:"Taarifa ya Utambulisho — Rasimu ya Sasa",steps:["Pitia kila kitu ulichoandika wiki hii. Chukua dakika 5.","Andika 'Mimi ni mtu ambaye ___' — kamilisha mara 5. Kila moja iwe ya kweli sasa hivi.","Chagua ile inayohisi ya uaminifu zaidi na ya usumbufu zaidi.","Iandike mahali pa kudumu. Utairudi Siku ya 30.","Wiki ya Utambulisho imekamilika."]},closer:"Wiki ijayo: Uwazi."}},
  {day:9,pillar:"Clarity",pillarColor:"#1A4A6B",en:{title:"How the Loop Works",opener:"Clarity week. This week is about patterns. Your patterns. Not theory — yours.",lesson:`Your brain builds habits by connecting a trigger to a behavior to a feeling. The habit loop: Cue → Routine → Reward.\n\nAlcohol hijacked this loop. The cue might be stress from work. The routine: pour a drink. The reward: the chemical release — dopamine, then GABA — that feels like relief.\n\nBut the relief is real. The brain genuinely experiences it as relief. That's not weakness — that's chemistry.\n\nThe problem is the loop runs on autopilot. By the time you're in the middle of a craving, your rational decision-making center is already partially offline.\n\n**The only way to interrupt an automatic response is to make it conscious before it triggers. That's what this week is about.**\n\nThat choice point — between cue and routine — is where freedom lives.`,reflection:"Think about the last time you drank or had a strong urge. What was the cue? What feeling were you seeking?",activity:{title:"Map One Loop",steps:["Pick one specific drinking situation you can picture clearly.","Write the CUE: what was happening right before? Time, location, emotion.","Write the ROUTINE: the exact behavior, step by step.","Write the REWARD: what feeling did your brain expect?","Now ask: 'What other routine could deliver a similar reward without the cost?' Write two ideas."]},closer:"One loop mapped. Tomorrow: the full landscape."},sw:{title:"Jinsi Kitanzi Kinavyofanya Kazi",opener:"Wiki ya Uwazi. Wiki hii ni kuhusu mifumo. Mifumo yako.",lesson:`Ubongo wako hujenga tabia kwa kuunganisha kichocheo na tabia na hisia. Kitanzi cha tabia: Ishara → Utaratibu → Thawabu.\n\nPombe ilichukua kitanzi hiki. Ishara inaweza kuwa msongo wa kazi. Utaratibu: mimina kinywaji. Thawabu: kutolewa kwa kemikali.\n\n**Njia pekee ya kukatiza jibu la kiotomatiki ni kulifanya liwe la ufahamu kabla halijachochewa.**`,reflection:"Fikiria mara ya mwisho ulipokunywa au kuwa na hamu kali. Kichocheo kilikuwa nini?",activity:{title:"Chora Kitanzi Kimoja",steps:["Chagua hali moja maalum ya kunywa.","Andika ISHARA: nini kilikuwa kikiendelea kabla yake?","Andika UTARATIBU: tabia halisi, hatua kwa hatua.","Andika THAWABU: ni hisia gani ubongo wako ulikuwa ukitegemea?","Uliza: 'Utaratibu mwingine gani ungeweza kutoa thawabu sawa?' Andika mawazo mawili."]},closer:"Kitanzi kimoja kimechorwa. Kesho: mazingira kamili."}},
  {day:10,pillar:"Clarity",pillarColor:"#1A4A6B",en:{title:"Your Trigger Landscape",opener:"Yesterday: one loop. Today: the full landscape.",lesson:`Most people can name one trigger: stress. But stress is a category, not a trigger.\n\nBeyond emotional triggers, there are:\n\n**Environmental triggers** — places, times of day, routes home. The bar on the corner. Friday at 5pm.\n\n**Social triggers** — specific people, specific dynamics. The friend group where it's expected.\n\n**Internal triggers** — thoughts, memories, physical sensations. The restlessness in your body.\n\nEveryone has a trigger landscape — a map of situations, feelings, people, and places that reliably activate his craving.\n\nMost people have never mapped it. They just keep walking through it blind.`,reflection:"Outside of stress — what are your other triggers? Which people, places, times, feelings?",activity:{title:"Trigger Landscape Map",steps:["Draw four columns: EMOTIONAL / ENVIRONMENTAL / SOCIAL / INTERNAL","Fill each column with every trigger you can identify. Be specific.","Circle the top 3 most powerful ones.","For each, write: 'When this triggers me, what I'm actually craving is ___ (feeling, not substance).'","Keep this map. You'll use it for the rest of the program."]},closer:"You've mapped the landscape. Tomorrow: the belief underneath each trigger."},sw:{title:"Mazingira Yako ya Vichocheo",opener:"Jana: kitanzi kimoja. Leo: mazingira kamili.",lesson:`Wanaume wengi wanaweza kutaja kichocheo kimoja. Msongo. Lakini msongo ni kategoria, si kichocheo.\n\nZaidi ya vichocheo vya kihisia, kuna:\n\n**Vichocheo vya mazingira** — mahali, nyakati za siku.\n\n**Vichocheo vya kijamii** — watu maalum, mienendo maalum.\n\n**Vichocheo vya ndani** — mawazo, kumbukumbu, hisia za kimwili.\n\nWanaume wengi hawajawahi kuyachora. Wanayapita tu bila kuona.`,reflection:"Nje ya msongo — ni vichocheo vyako vingine gani? Watu wapi, mahali papi, nyakati zipi?",activity:{title:"Ramani ya Mazingira ya Vichocheo",steps:["Chora safu nne: KIHISIA / MAZINGIRA / KIJAMII / YA NDANI","Jaza kila safu na kila kichocheo unachoweza kutambua. Kuwa maalum.","Zungushia 3 za nguvu zaidi.","Kwa kila moja, andika: 'Kichocheo hiki kinaponichochea, ninachotamani kweli ni ___.'","Hifadhi ramani hii."]},closer:"Umechora mazingira. Kesho: imani chini ya kila kichocheo."}},
  {day:11,pillar:"Clarity",pillarColor:"#1A4A6B",en:{title:"The Belief Underneath",opener:"Surface triggers are real. But there's always something deeper.",lesson:`Here's something most people never figure out: the trigger is not the situation. The trigger is the belief that activates when you're in that situation.\n\n"I drink when I'm stressed" really means: "When I feel stressed, I believe I cannot handle it on my own."\n\n"I drink when things are quiet" really means: "When things are quiet, I believe what I'll find in the silence is something I can't face."\n\n**The trigger pulls the lever. But it's the belief that activates the craving.**\n\nYou can remove every surface trigger and still relapse — because the belief is still there. The work of this program is to update the belief through accumulated evidence.`,reflection:"Pick your strongest trigger. What is the underlying belief it activates?",activity:{title:"Belief Extraction",steps:["Take your #1 trigger from yesterday's map.","Complete: 'When [trigger] happens, I feel [emotion]. When I feel that, I believe I am [belief about myself].'","Ask: 'Where did I first start believing that? When did that belief form?'","Ask: 'Is that belief actually true? What evidence do I have that it isn't?'","Write one piece of counter-evidence — one moment you handled something hard without needing to numb it."]},closer:"The belief is the real work. You've started it."},sw:{title:"Imani Chini",opener:"Vichocheo vya juu ni vya kweli. Lakini kuna kitu kirefu zaidi kila wakati.",lesson:`Hapa kuna kitu ambacho watu wengi hawagundui kamwe: kichocheo si hali. Kichocheo ni imani inayowashwa ukiwa katika hali hiyo.\n\n"Ninanywa ninapokuwa na msongo" inamaanisha kweli: "Ninapohisi msongo, ninaamini siwezi kukishughulikia peke yangu."\n\n**Kichocheo huteleza lever. Lakini ni imani inayowasha kutamani.**`,reflection:"Chagua kichocheo chako cha nguvu zaidi. Ni imani ya msingi gani inayowashwa?",activity:{title:"Uchimbaji wa Imani",steps:["Chukua kichocheo chako #1 kutoka ramani ya jana.","Kamilisha: 'Kichocheo [X] kikitokea, nahisi [hisia]. Ninapohisi hivyo, ninaamini mimi ni [imani].'","Uliza: 'Nilianza lini kuamini hilo?'","Uliza: 'Je, imani hiyo ni ya kweli? Ni ushahidi gani ninao kwamba si kweli?'","Andika kipande kimoja cha ushahidi wa kupinga."]},closer:"Imani ndiyo kazi halisi. Umeisimamisha."}},
  {day:12,pillar:"Clarity",pillarColor:"#1A4A6B",en:{title:"Building Your Interrupt",opener:"You've mapped your triggers. You've identified your beliefs. Today we build the interrupt.",lesson:`An interrupt is a pre-committed response to a specific trigger — designed before the moment arrives.\n\nThe reason: under stress, your rational brain goes partially offline. Your autopilot takes over. By the time a craving activates, you don't have full access to rational decision-making.\n\nSo you have to make the rational decision in advance and install it as a new automatic response.\n\nStructure: **If [cue], then [specific action].**\n\n"If it's 6pm and I walk through the door after a hard day, I will immediately change my clothes, go to the kitchen, and make tea before I do anything else."\n\nSpecific. Executable. An interrupt.\n\n**You are not breaking a habit. You are installing a new one on top of it.**`,reflection:"For your top trigger — what specific, executable interrupt could you install?",activity:{title:"Design Your Interrupt",steps:["Take your top 3 triggers from Day 10.","For each, write an If-Then plan: 'If [specific trigger], then I will [specific immediate action].'","The action should: take less than 2 minutes to start, be doable wherever you are.","Write the three interrupts somewhere visible.","Practice one tonight — even without a trigger."]},closer:"The interrupt is installed. Tomorrow: the last day of Clarity week."},sw:{title:"Kujenga Kukatizwa Kwako",opener:"Umechora vichocheo vyako. Umetambua imani zako. Leo tunajenga kukatizwa.",lesson:`Kukatizwa ni jibu lililowekwa mapema kwa kichocheo maalum — unaolibuni kabla wakati haujafika.\n\nMuundo: **Kama [ishara], basi [hatua maalum].**\n\n"Kama ni saa 12 usiku na ninatembea kupitia mlango baada ya siku ngumu, mara moja nitabadilisha nguo zangu na nifanye chai."\n\n**Hujabomoa tabia. Unasanikisha mpya juu yake.**`,reflection:"Kwa kichocheo chako cha juu — kukatizwa gani maalum ungeweza kukisakinisha?",activity:{title:"Buni Kukatizwa Kwako",steps:["Chukua vichocheo vyako 3 vya juu kutoka Siku ya 10.","Kwa kila kimoja, andika mpango wa Kama-Basi.","Hatua inapaswa: kuchukua chini ya dakika 2 kuanza.","Andika kukatizwa kwa tatu mahali penye kuonekana.","Fanya mazoezi ya moja usiku huu."]},closer:"Kukatizwa kumewekwa. Kesho: siku ya mwisho ya wiki ya Uwazi."}},
  {day:13,pillar:"Clarity",pillarColor:"#1A4A6B",en:{title:"Clarity Week: Integration",opener:"Five days of Clarity. You've built something real. Today we lock it in.",lesson:`This week you mapped the habit loop, built your trigger landscape, dug into the belief underneath the trigger, and designed your interrupt.\n\n**Your patterns are not random and they are not who you are.** They are learned responses to real triggers, organized around real beliefs. They can be understood. And what can be understood can be interrupted.\n\nYou are not your patterns. You are the man underneath them, doing the work of changing them.\n\nNext: Discipline. Understanding the pattern isn't enough. You need systems that hold you when motivation disappears.`,reflection:"What did you learn about yourself this week that you didn't fully know before?",activity:{title:"Clarity Week Summary",steps:["Write your single most powerful trigger.","Write the belief underneath it.","Write your interrupt for it.","Write: 'The pattern I'm most committed to interrupting in the next 17 days is ___.'","Read it. Sign it if you want. That's a commitment to yourself."]},closer:"Clarity done. Next week: Discipline."},sw:{title:"Wiki ya Uwazi: Muunganiko",opener:"Siku tano za Uwazi. Umejenga kitu halisi wiki hii. Leo tunakifunga.",lesson:`Wiki hii ulichora kitanzi cha tabia, ulijenga mazingira yako ya vichocheo, ulichimba ndani ya imani, na uliunda kukatizwa.\n\n**Mifumo yako si ya nasibu na si wewe ni nani.** Ni majibu yaliyojifunza kwa vichocheo vya kweli. Yanaweza kueleweka. Na kinachoweza kueleweka kinaweza kukatizwa.`,reflection:"Wiki hii, ulijifunza nini kuhusu wewe mwenyewe ambacho hukujua kikamilifu kabla?",activity:{title:"Muhtasari wa Wiki ya Uwazi",steps:["Andika kichocheo chako kimoja cha nguvu zaidi.","Andika imani chini yake.","Andika kukatizwa kwako kwa ajili yake.","Andika: 'Mfumo ninaojitolea zaidi kuukatiza ni ___.'","Soma. Tia saini kama unataka."]},closer:"Uwazi umekamilika. Wiki ijayo: Nidhamu."}},
  {day:14,pillar:"Discipline",pillarColor:"#1E6823",en:{title:"Why Willpower Always Loses",opener:"Discipline week. This is where most people think the work is. It's not — but it's where the structure gets built.",lesson:`Everyone who has tried to stop drinking has tried willpower. And most have experienced this: it works for a while. Then it doesn't.\n\nWillpower is a cognitive resource — and it depletes. Every decision draws from the same pool. By evening, when your defenses are lowest, your tank is nearly empty.\n\n**Discipline is not about forcing yourself through hard moments. Discipline is about designing your life so the hard moments are less frequent and less intense.**\n\nThe difference between those who stay sober and those who keep relapsing is not strength of character. It's architecture of daily life.`,reflection:"Where in your daily life is willpower the only thing standing between you and the bottle?",activity:{title:"Willpower Audit",steps:["Map your day from wake to sleep. Identify the 3 highest-risk windows.","For each: 'What structure do I currently have here? What happens naturally that could lead to drinking?'","Write what's missing — not what you wish you felt, but what structure isn't there.","Pick the highest-risk window. That's where you focus this week.","Write one concrete change you could make that doesn't require willpower."]},closer:"You've found the gap. This week we fill it — with structure, not effort."},sw:{title:"Kwa Nini Nguvu za Mapenzi Daima Hushindwa",opener:"Wiki ya Nidhamu. Hapa ndipo watu wengi wanafikiri kazi ipo.",lesson:`Nguvu za mapenzi ni rasilimali ya utambuzi — na inapungua. Kila uamuzi hutoa kutoka kwenye bwawa moja. Jioni, ulinzi wako ukiwa chini zaidi, tangi yako iko karibu tupu.\n\n**Nidhamu si kujilazimu kupitia nyakati ngumu. Nidhamu ni kuunda maisha yako ili nyakati ngumu ziwe chache.**\n\nTofauti kati ya mtu anayeendelea na mtu anayerudi nyuma si nguvu za tabia. Ni usanifu wa maisha ya kila siku.`,reflection:"Wapi katika maisha yako ya kila siku nguvu za mapenzi ndiyo kitu pekee kinachosimama kati yako na chupa?",activity:{title:"Ukaguzi wa Nguvu za Mapenzi",steps:["Chora siku yako kutoka amka hadi lala. Tambua madirisha 3 ya hatari zaidi.","Kwa kila dirisha, uliza: 'Ni muundo gani ninao hapa?'","Andika kinachokosekana.","Chagua dirisha la hatari zaidi.","Andika mabadiliko moja ya kimwili ambayo haihitaji nguvu za mapenzi."]},closer:"Umepata pengo. Wiki hii tunaliziba — kwa muundo, si kwa juhudi."}},
  {day:15,pillar:"Discipline",pillarColor:"#1E6823",en:{title:"One Non-Negotiable",opener:"Yesterday you found the gap. Today you start filling it — with the smallest possible thing.",lesson:`Most people do this wrong when they decide to change: they try to change everything at once.\n\nThis fails. The cognitive load of managing multiple new behaviors simultaneously is too high.\n\nOne small behavior, practiced consistently, creates stronger neural pathways than multiple behaviors practiced inconsistently.\n\n**One thing. Every day. No exceptions.**\n\nThree criteria — each one non-negotiable:\n\n1. Small enough to do on your absolute worst day. If you can't do it sick and exhausted, it's too big.\n2. Immediate and specific. "10 push-ups after waking" — not "exercise more." Time and action both named.\n3. Not directly about alcohol. This builds evidence that you keep commitments to yourself — any commitment.\n\nEvery time you do it, you cast a vote for who you're becoming.`,reflection:"What one daily behavior — small enough for your worst day — could you commit to for the remaining 16 days?",activity:{title:"Install Your Non-Negotiable",steps:["Choose your one daily practice. Test it: small enough for worst day, immediate and specific, not directly about alcohol.","Write: 'Every day, at [specific time], I will [specific action]. It takes [X minutes].'","Do it today. Right now if you can.","Track it somewhere visible.","This is the one thing that holds the rest of the structure together."]},closer:"One non-negotiable installed. Tomorrow we build the daily architecture around it."},sw:{title:"Moja Isiyoweza Kuepukika",opener:"Jana ulipata pengo. Leo unaanza kulijaza — na kitu kidogo zaidi iwezekanavyo.",lesson:`Kitu kimoja. Kila siku. Bila ubaguzi.\n\nVigezo vitatu:\n1. Kidogo vya kutosha kufanya siku yako mbaya zaidi.\n2. Cha haraka na maalum.\n3. Isihusiane moja kwa moja na pombe.\n\nKila unapofanya, unapiga kura kwa mtu unayemkuwa.`,reflection:"Ni tabia gani moja ya kila siku unaweza kujitolea kwa siku 16 zilizobaki?",activity:{title:"Sakinisha Isiyoweza Kuepukika Yako",steps:["Chagua mazoezi yako moja ya kila siku.","Iandike: 'Kila siku, saa [wakati maalum], nitafanya [hatua maalum].'","Ifanye leo. Sasa hivi kama unaweza.","Fuatilia mahali penye kuonekana.","Hii ndiyo kitu kimoja kinachoshikilia muundo wote mwingine."]},closer:"Isiyoweza kuepukika moja imewekwa. Kesho tunajenga usanifu wa kila siku."}},
  {day:16,pillar:"Discipline",pillarColor:"#1E6823",en:{title:"Environment Design",opener:"You've built the internal structure. Today we build the external one.",lesson:`Your environment is making decisions for you.\n\nThe bottle on the counter is a decision. The route home that passes the bar is a decision. The empty evening with no plan is a decision.\n\n**Environment design is the practice of deliberately restructuring your environment so that the gravitational pull works in your favor, not against you.**\n\nIt is easier to not drink if alcohol is not in the house. That's not a revelation — but how many people actually remove it?\n\nSmall structural changes. Individually almost too simple. Collectively, they reduce the daily demand on willpower significantly.\n\nLess demand on willpower = more capacity for decisions that matter.`,reflection:"What in your environment is currently set up in a way that makes drinking easier?",activity:{title:"Redesign One Environment",steps:["Pick your highest-risk environment.","Write 3 specific physical changes that would add friction to drinking.","Write 3 physical changes that would make an alternative behavior easier.","Implement at least one of each — today, before you sleep.","This is not about perfection. Making the right choice 10% easier and the wrong choice 10% harder."]},closer:"The environment is starting to work with you. Tomorrow: the morning structure."},sw:{title:"Muundo wa Mazingira",opener:"Umejenga muundo wa ndani. Leo tunajenga wa nje.",lesson:`Mazingira yako yanafanya maamuzi kwa ajili yako.\n\nChupa kwenye kaunta ni uamuzi. Njia ya nyumbani inayopita baa ni uamuzi.\n\n**Muundo wa mazingira ni mazoezi ya kuunda upya mazingira yako kwa makusudi ili mvuto wa uvutano ufanye kazi kupendelea yako.**\n\nNi rahisi zaidi kutokunywa kama pombe haiko nyumbani. Hiyo si ufunuo — lakini ni wanaume wangapi kweli wanaiondoa?`,reflection:"Ni nini katika mazingira yako ya kimwili kwa sasa kimewekwa kwa njia inayofanya kunywa kuwa rahisi zaidi?",activity:{title:"Buni Upya Mazingira Moja",steps:["Chagua mazingira yako ya hatari zaidi.","Andika mabadiliko 3 maalum ya kimwili ambayo yataongeza msuguano wa kunywa.","Andika mabadiliko 3 ambayo yatafanya tabia mbadala kuwa rahisi zaidi.","Tekeleza angalau moja ya kila — leo, kabla haujolala.","Kufanya chaguo sahihi kuwa rahisi zaidi kwa 10% na chaguo baya kuwa gumu zaidi kwa 10%."]},closer:"Mazingira yanaanza kufanya kazi nawe. Kesho: muundo wa asubuhi."}},
  {day:17,pillar:"Discipline",pillarColor:"#1E6823",en:{title:"The Morning That Sets the Day",opener:"How you start your day determines a surprising amount about how it ends.",lesson:`The first hour after waking is when your prefrontal cortex is most available. Your willpower tank is full.\n\nWhat most people do with that hour: check their phone, scroll, react to whatever is pulling for their attention. By the time they've been reactive for 30 minutes, they've depleted the cognitive resource that was most available.\n\n**A morning routine is not a productivity hack. It is a way of starting every day on your terms, not the world's terms.**\n\nIn this work, the morning routine signals to your nervous system: you are the one in charge of your day. Not the craving. Not the trigger. Not the autopilot.\n\nThree things, done in the same order, before the phone comes out. That's enough.`,reflection:"What does your current morning look like? Does it set you up or put you immediately in reactive mode?",activity:{title:"Build Your Morning Sequence",steps:["Write your current first 30 minutes after waking. Be honest about what actually happens.","Now design what it could look like — 3 things, in order, before you check your phone. Under 15 minutes total.","The three things should be physical, intentional, and repeatable.","Do this sequence tomorrow morning. Set a reminder tonight.","The morning sequence is the first act of every day being yours."]},closer:"One more day of Discipline. Tomorrow we put it all together."},sw:{title:"Asubuhi Inayoweka Siku",opener:"Jinsi mtu anavyoanzia siku yake inaathiri sana jinsi inavyoisha.",lesson:`Saa ya kwanza baada ya kuamka ni wakati ambapo gamba lako la mbele linapatikana zaidi. Nguvu za mapenzi zako ziko kamili.\n\nWatu wengi hufanya nini na saa hiyo: angalia simu zao, tembeza mitandao ya kijamii.\n\n**Utaratibu wa asubuhi si njia ya tija. Ni njia ya kuanza kila siku kwa masharti yako, si masharti ya ulimwengu.**`,reflection:"Asubuhi yako ya sasa inaonekana vipi? Je, inakuweka tayari au inakuweka katika hali ya kujibu?",activity:{title:"Jenga Mlolongo Wako wa Asubuhi",steps:["Andika dakika 30 zako za kwanza za sasa baada ya kuamka. Kuwa mkweli.","Sasa buni ingeweza kuonekana vipi — mambo 3, kwa mpangilio, kabla hujaangalia simu yako.","Mambo matatu yatakuwa ya kimwili, ya makusudi, na yanayoweza kurudiwa.","Fanya mlolongo huu asubuhi ya kesho.","Mlolongo wa asubuhi ni tendo la kwanza la kila siku kuwa lako."]},closer:"Siku moja zaidi ya Nidhamu. Kesho tunaleta yote pamoja."}},
  {day:18,pillar:"Discipline",pillarColor:"#1E6823",en:{title:"Discipline Week: Integration",opener:"Five days of Discipline. You've built real structure. Today we integrate it.",lesson:`Discipline week was not about restriction. It was about design.\n\nYou identified where willpower was your only defense — and started replacing it with structure. You installed a non-negotiable. Redesigned your environment. Built a morning sequence.\n\nDiscipline is the scaffolding, not the building. The building is identity, purpose, connection, freedom. Discipline holds the structure in place while you build it.\n\n**You're not restricting yourself. You're designing your life around your values.**\n\nNext: Purpose. You understand yourself. You have structure. Now we find the direction.`,reflection:"Where do you feel the structure starting to hold? Where are the gaps that still need work?",activity:{title:"Discipline Week Summary",steps:["Write your one non-negotiable. Confirm you did it today.","Write the one environmental change you made.","Write your morning sequence (3 steps, in order).","Write one gap that still needs structure.","That gap is your next target."]},closer:"Discipline done. Next: Purpose. You've got the structure. Now we give it a direction."},sw:{title:"Wiki ya Nidhamu: Muunganiko",opener:"Siku tano za Nidhamu. Umejenga muundo halisi wiki hii. Leo tunaunganisha.",lesson:`Wiki ya Nidhamu haikuhusu kizuizi. Ilikuhusu muundo.\n\nNidhamu ni jukwaa, si jengo. Jengo ni utambulisho, kusudi, uhusiano, uhuru. Nidhamu inashikilia tu muundo mahali pake.\n\n**Hujitozui mwenyewe. Unaunda maisha yako kuzunguka maadili yako.**`,reflection:"Wapi unahisi muundo unaanza kushikilia? Wapi pengo bado linahitaji kazi?",activity:{title:"Muhtasari wa Wiki ya Nidhamu",steps:["Andika isiyoweza kuepukika yako moja. Thibitisha uliifanya leo.","Andika mabadiliko moja ya mazingira uliofanya.","Andika mlolongo wako wa asubuhi (hatua 3, kwa mpangilio).","Andika pengo moja ambalo bado linahitaji muundo.","Pengo hilo ndiyo lengo lako lijalo."]},closer:"Nidhamu imekamilika. Inayofuata: Kusudi."}},
  {day:19,pillar:"Purpose",pillarColor:"#7D6608",en:{title:"The Vacuum You Created",opener:"Purpose week. This is where most people discover why sobriety feels hollow — and what to do about it.",lesson:`When someone removes alcohol without filling the space with something meaningful, a vacuum forms. Nature abhors a vacuum. Something fills it.\n\nFor many, it's work. They become workaholics — the adrenaline of busyness replacing the chemical release of alcohol. "Sober" but running on a different fuel doing the same job.\n\nThis is the substitution trap from Day 3.\n\n**Purpose is not a grand vision. It's the answer to a simpler question: What am I building, and why does it matter today?**\n\nThat answer — even small and honest — changes the neuroscience. It activates the prefrontal cortex. It makes the craving less compelling because there's something more compelling in its place.`,reflection:"Right now — what are you building? Not eventually. What are you actually building with your time and energy today?",activity:{title:"The Vacuum Audit",steps:["Estimate: how many hours per week did drinking (and recovering) consume?","What have you done with those hours since reducing or stopping? Be honest.","What would you do with those hours if fully honest about what you want?","Circle one that genuinely excites you.","Write the smallest version of that thing you could start this week."]},closer:"You've identified the vacuum. Tomorrow we start filling it."},sw:{title:"Ombwe Ulilounda",opener:"Wiki ya Kusudi. Hapa ndipo watu wengi hugundua kwa nini ulevi unahisi tupu.",lesson:`Mtu anapotoa pombe maishani mwake bila kujaza nafasi na kitu chenye maana, anaunda ombwe. Asili inachukia ombwe. Kitu kinaijaza.\n\nKwa wengi, ni kazi. Wanakuwa wafanyakazi kupita kiasi.\n\n**Kusudi si maono makubwa. Ni jibu la swali rahisi zaidi: Ninajenga nini, na kwa nini inafaa leo?**`,reflection:"Sasa hivi — unajenga nini? Si unataka kujenga hatimaye. Unajenga kweli nini na wakati wako leo?",activity:{title:"Ukaguzi wa Ombwe",steps:["Kadiria: masaa mangapi kwa wiki kunywa kulitumia?","Umefanya nini na masaa hayo tangu kupunguza? Kuwa mkweli.","Ungefanya nini na masaa hayo kama ukiwa mkweli kabisa?","Zungushia moja ambalo linakufurahisha kweli.","Andika toleo dogo zaidi la kitu hicho unaweza kuanza wiki hii."]},closer:"Umetambua ombwe. Kesho tunaanza kulijaza."}},
  {day:20,pillar:"Purpose",pillarColor:"#7D6608",en:{title:"Finding Your North Star",opener:"Yesterday: the vacuum. Today: what fills it.",lesson:`Thomas Sankara became president of Burkina Faso at 33. He inherited one of the poorest countries on earth, surrounded by enemies, with no powerful allies. He had every reason to compromise, slow down, or stop.\n\nHe didn't. And when asked why he kept going under conditions most people would have walked away from, his answer was always the same: he knew exactly what he was building and who it was for. The why was so clear it made the suffering secondary.\n\nHe was assassinated in 1987. But the reason his name still carries weight across a continent is that he showed what a person can endure when purpose is real and not borrowed.\n\nA person can endure almost any suffering if they have a clear answer to "why."\n\nOn the days when this is hard — when the trigger is loud — the thing that keeps you in the game is a clear, personal answer to why it matters.\n\nNot a slogan. Not someone else's answer.\n\n**Your answer. Your North Star.**\n\nOne sentence. It just has to be true right now and it has to be yours.`,reflection:"Write your most honest answer to: 'Why does this work actually matter to me? Not to anyone else. To me, specifically.'",activity:{title:"Write Your North Star",steps:["Set a timer for 10 minutes. Write without stopping about what your life looks like in 3 years if you complete this work fully.","Now write what your life looks like in 3 years if nothing fundamentally changes.","Read both. What do you refuse to let happen?","Turn that refusal into a positive statement: 'I am doing this because ___.' Under 20 words.","Write it somewhere you'll see it on hard days."]},closer:"The North Star is set. Tomorrow: making it operational."},sw:{title:"Kupata Nyota Yako ya Kaskazini",opener:"Jana: ombwe. Leo: kinachokijaza.",lesson:`Thomas Sankara alikuwa rais wa Burkina Faso akiwa na umri wa miaka 33. Alirithi moja ya nchi maskini zaidi duniani, amezingirwa na maadui, bila washirika wenye nguvu. Alikuwa na kila sababu ya kuacha au kupunguza kasi.\n\nHakufanya hivyo. Na alipoombwa akueleze kwa nini aliendelea katika hali ambazo watu wengi wangeacha, jibu lake lilikuwa moja daima: alijua kabisa anachokijenga na ni kwa ajili ya nani. Kwa nini ilikuwa wazi kiasi kwamba maumivu yakawa ya pili.\n\nAliuawa mwaka 1987. Lakini sababu jina lake bado linabeba uzito kote barani Afrika ni kwamba alionyesha mtu anaweza kustahimili nini pale kusudi ni la kweli na si la kukopa.\n\nMtu anaweza kustahimili karibu maumivu yoyote kama ana jibu wazi la "kwa nini."\n\nSiku hii inapokuwa ngumu — kichocheo kikisimama kwa kelele — kinachokushikilia ni jibu wazi, la kibinafsi la kwa nini hii inafaa.\n\nSi kauli mbiu. Si jibu la mtu mwingine.\n\n**Jibu lako. Nyota yako ya Kaskazini.**\n\nSentensi moja. Inahitaji tu kuwa ya kweli sasa hivi na iwe yako.`,reflection:"Andika jibu lako la uaminifu zaidi la: 'Kwa nini kazi hii inanifaa kweli? Si kwa mtu mwingine. Kwangu, maalum.'",activity:{title:"Andika Nyota Yako ya Kaskazini",steps:["Weka kipindi cha dakika 10. Andika bila kuacha kuhusu maisha yako katika miaka 3 kama ukikamilisha kazi hii.","Sasa andika maisha yako katika miaka 3 kama hakuna kinachobadilika.","Soma vyote viwili. Ni nini unakataa kutokea?","Geuza kukataliwa kuwa taarifa chanya: 'Ninafanya hili kwa sababu ___.' Chini ya maneno 20.","Iandike mahali utakapoona siku ngumu."]},closer:"Nyota ya Kaskazini imewekwa. Kesho: kuifanya inayofanya kazi."}},
  {day:21,pillar:"Purpose",pillarColor:"#7D6608",en:{title:"Purpose into Practice",opener:"A North Star is useless if you can't see it from where you're standing.",lesson:`Most people who find purpose make one of two mistakes.\n\n**Mistake one:** The purpose is too abstract. "Be a better person" is real and good. But on a Tuesday night when the trigger is loud, it doesn't tell you what to do with your hands.\n\n**Mistake two:** The purpose is someone else's — borrowed and never tested under pressure. When things get hard, borrowed purposes collapse.\n\nPurpose needs to be translated into daily life. Not as grand gestures. As specific, regular, small actions that express that purpose.\n\n**The daily action IS the purpose made real.**\n\nYou don't need to feel the purpose every day. You just need to do the action.`,reflection:"Take your North Star. What one specific daily action points directly toward it?",activity:{title:"Purpose into Action",steps:["Write your North Star at the top of the page.","Write 5 specific daily actions that would express that purpose concretely.","Pick one. That's your purpose action — the thing you do every day that makes the direction real.","Add it to your daily structure alongside your non-negotiable from Discipline week.","Do it today."]},closer:"Purpose is operational. Tomorrow: what you're protecting."},sw:{title:"Kusudi katika Vitendo",opener:"Nyota ya Kaskazini haina maana kama huwezi kuiona kutoka unakosimama.",lesson:`Wengi wanaopata hisia ya kusudi hufanya moja ya makosa mawili.\n\n**Kosa moja:** Kusudi ni la kufikirika sana. "Kuwa mtu bora" ni la kweli na zuri. Lakini Jumanne jioni kichocheo kikisimama kwa kelele, haikuambia nini cha kufanya na mikono yako.\n\n**Kosa la pili:** Kusudi ni la mtu mwingine — lililokopwa na halijapimwa chini ya shinikizo.\n\n**Hatua ya kila siku NI kusudi lililofanywa halisi.**`,reflection:"Chukua Nyota yako ya Kaskazini. Ni hatua gani moja maalum ya kila siku inayoelekeza moja kwa moja kwake?",activity:{title:"Kusudi katika Hatua",steps:["Andika Nyota yako ya Kaskazini juu ya ukurasa.","Andika hatua 5 maalum za kila siku ambazo zingeelezea kusudi hilo.","Chagua moja. Hiyo ndiyo hatua yako ya kusudi.","Kiongeze kwenye muundo wako wa kila siku.","Kifanye leo."]},closer:"Kusudi kinafanya kazi. Kesho: unachokinalinda."}},
  {day:22,pillar:"Purpose",pillarColor:"#7D6608",en:{title:"What You're Protecting",opener:"Last day of Purpose week. Today we get concrete about what's at stake.",lesson:`Purpose has two directions: what you're building toward, and what you're protecting.\n\nOn the hardest days — when the craving is loudest — what often holds a person in place is the second one.\n\nMaybe it's a child. The presence you can or cannot offer them. Maybe it's a relationship. Maybe it's your own future — what you'll be able to do at 50 or 60.\n\n**What are you not willing to lose?**\n\nThat question, answered honestly, is one of the most powerful motivators available. And it doesn't require a good day to access. On a bad day, you can still ask: what am I not willing to lose?\n\nThat answer will hold when the positive vision doesn't.`,reflection:"What are you protecting? Not what you're building — what are you not willing to lose?",activity:{title:"What You're Protecting",steps:["Write: 'I am not willing to lose ___.' Complete it at least 5 times. Be specific.","For each, write one concrete consequence of losing it if nothing changes.","Circle the one that hits hardest. That's your protection motive.","Write it alongside your North Star. These two are your purpose anchors.","Come back to these on Day 30."]},closer:"Purpose week done. Next: Connection."},sw:{title:"Unachokinalinda",opener:"Siku ya mwisho ya wiki ya Kusudi. Leo tunakuwa wazi kuhusu kinachoko hatarini.",lesson:`Kusudi kina pande mbili: unachojenga kwake, na unachokinalinda.\n\nSiku ngumu zaidi — kichocheo kikiwa na kelele zaidi — kinachomshikilia mtu mahali pake mara nyingi ni la pili.\n\n**Ni nini usicho tayari kupoteza?**\n\nSwali hilo, likijibiwa kwa uaminifu, ni mojawapo ya vichocheo vikubwa zaidi vinavyopatikana. Na haihitaji siku nzuri kupata. Siku mbaya, bado unaweza kuuliza.`,reflection:"Unakinalinda nini? Si unachojenga — ni nini usicho tayari kupoteza?",activity:{title:"Unachokinalinda",steps:["Andika: 'Siko tayari kupoteza ___.' Kimilisha angalau mara 5. Kuwa maalum.","Kwa kila moja, andika matokeo moja ya kukipoteza kama hakuna kinachobadilika.","Zungushia moja inayogonga zaidi. Hiyo ndiyo nia yako ya ulinzi.","Iandike pamoja na Nyota yako ya Kaskazini. Hizi mbili ni nanga zako za kusudi.","Rudi kwa hizi Siku ya 30."]},closer:"Wiki ya Kusudi imekamilika. Inayofuata: Uhusiano."}},
  {day:23,pillar:"Connection",pillarColor:"#6C3483",en:{title:"Why Isolation Is the Enemy",opener:"Connection week. This is the pillar most people resist most. And the one that changes the most.",lesson:`Bruce Alexander's Rat Park experiment changed how scientists understand addiction. Isolated rats given heroin became compulsive users. Rats in an enriched social environment used it occasionally but showed no compulsive pattern.\n\nThe variable was not the drug. The variable was isolation versus connection.\n\nJohann Hari's conclusion: "The opposite of addiction is not sobriety. It's connection."\n\nThis is neurochemistry. Oxytocin — released through genuine connection — directly downregulates the dopamine craving circuits. Social isolation upregulates them.\n\n**Isolation is not just uncomfortable. It is biologically dangerous for anyone doing this work.**\n\nConnection doesn't mean meetings or performing vulnerability. It means one real relationship where you don't have to perform.\n\nOne is enough to change the chemistry.`,reflection:"How much of your life right now is spent in genuine connection — where you're not performing, just being real?",activity:{title:"Connection Audit",steps:["Draw three circles. Label them Inner, Middle, Outer.","Inner = people who know the real you. Write names.","Middle = people you respect but keep at emotional arm's length.","Outer = acquaintances, colleagues.","Is anyone in the inner circle? When did you last be real with them?"]},closer:"You've mapped your connection landscape. Tomorrow: what to do with it."},sw:{title:"Kwa Nini Kutengwa Ni Adui",opener:"Wiki ya Uhusiano. Hii ndiyo nguzo ambayo watu wengi wanapinga zaidi. Na ndiyo inayobadilika zaidi.",lesson:`Jaribio la Bustani ya Panya la Bruce Alexander libadilisha jinsi wataalamu wa sayansi wanavyoelewa uraibu. Panya waliokuwa peke yao waliokuwa na ufikiaji wa heroin wakawa watumiaji wa compulsive. Panya katika mazingira ya kijamii yaliyoboreshwa hawakuonyesha mfumo wa compulsive.\n\nTofauti haikuwa dawa. Tofauti ilikuwa kutengwa dhidi ya uhusiano.\n\n**Kutengwa si kusumbufu tu. Ni hatari kibiolojia kwa mtu katika kazi hii.**\n\nUhusiano si mikutano au utendaji wa uwazi. Ni uhusiano mmoja wa kweli ambapo huhitaji kutumika.\n\nMmoja unatosha kubadilisha kemikali.`,reflection:"Kiasi gani cha maisha yako sasa hivi kinatumika katika uhusiano wa kweli?",activity:{title:"Ukaguzi wa Uhusiano",steps:["Chora miduara mitatu. Iandike Ndani, Kati, Nje.","Ndani = watu wanaojua wewe wa kweli. Andika majina.","Kati = watu unaowaheshimu lakini unaweka umbali wa kihisia.","Nje = marafiki, wafanyakazi wenzako.","Je, kuna mtu yeyote ndani? Ni lini mara ya mwisho ukawa wa kweli nao?"]},closer:"Umechora mandhari yako ya uhusiano. Kesho: nini cha kufanya nazo."}},
  {day:24,pillar:"Connection",pillarColor:"#6C3483",en:{title:"One Real Conversation",opener:"You've mapped the landscape. Today you do something with it.",lesson:`The reason most people don't open up is not lack of trust. It's lack of practice.\n\nAcross cultures and genders, most of us are taught — in different ways — to manage alone. Don't burden others. Stay composed. Handle it. By the time we're in our 30s or 40s, we may not have had a genuinely honest conversation with anyone in years.\n\nThis isn't a gender issue. It's a human one. The performance looks different depending on who you are — but almost everyone is performing something.\n\n**I'm not asking you to be vulnerable. I'm asking you to have one real conversation.**\n\nOne conversation where you drop the performance. Where you say something true that you haven't said before. It doesn't have to be about sobriety. It just has to be real.\n\nAnd here's what usually happens: the other person exhales. Because almost everyone is performing too. The moment one person drops it, it gives the other permission to do the same.`,reflection:"Who in your life is most likely to handle a real conversation — without judgment, without trying to fix it?",activity:{title:"The One Real Conversation",steps:["Identify the person.","Decide what you'll say — one true thing you haven't said before. Doesn't have to be big. Just real.","Have the conversation this week. Not eventually. This week.","After: write what happened. What shifted?","If you genuinely can't identify one person — that's the data. Write why. That's the next work."]},closer:"One real conversation. That's this week's most important task."},sw:{title:"Mazungumzo Moja ya Kweli",opener:"Umechora mandhari. Leo unafanya kitu nazo.",lesson:`Sababu watu wengi hawafunuki si ukosefu wa uaminifu. Ni ukosefu wa mazoezi.\n\nKatika tamaduni nyingi, watu wengi wanafundishwa — kwa njia tofauti — kushughulikia mambo peke yao. Usibebeshee wengine mzigo wako. Kaa imara. Jishughulikie. Hii si tatizo la jinsia moja tu — ni tatizo la kibinadamu. Utendaji unaonekana tofauti kulingana na wewe ni nani — lakini karibu kila mtu anaigiza kitu.\n\n**Siniombi uwe wazi. Ninakuomba uwe na mazungumzo moja ya kweli.**\n\nMazungumzo moja ambapo unaacha utendaji. Ambapo unasema kitu cha kweli ambacho hukusema kabla. Ni lazima iwe ya kweli tu.`,reflection:"Ni nani maishani mwako ana uwezekano mkubwa zaidi wa kuweza kushughulikia mazungumzo ya kweli?",activity:{title:"Mazungumzo Moja ya Kweli",steps:["Tambua mtu.","Amua utakachosema — kitu kimoja cha kweli ambacho hukusema kabla.","Kuwa na mazungumzo wiki hii. Si hatimaye. Wiki hii.","Baadaye: andika kilichotokea.","Kama huwezi kweli kutambua mtu mmoja — hiyo ndiyo data. Andika kwa nini."]},closer:"Mazungumzo moja ya kweli. Hiyo ndiyo kazi muhimu zaidi ya wiki hii."}},
  {day:25,pillar:"Connection",pillarColor:"#6C3483",en:{title:"The People Around You",opener:"Two days into Connection week. Today we zoom out.",lesson:`You are shaped by the people you spend time with. Mirror neurons cause us to unconsciously adopt the behaviors and patterns of the people we're around most.\n\nIf you spend most of your time around people who drink heavily, whose solution to difficulty is numbing — you are swimming upstream. Not impossible, but harder.\n\nIf you spend time around people who are building something, who take their state seriously — the current works with you.\n\nThis is not about judging your friends. It's about being honest about the environment you're living in.\n\n**The goal is to be connected to people who support who you're becoming — not who you're trying to leave behind.**`,reflection:"Look at the people you spend the most time with. What behaviors do they model? What does that cost you?",activity:{title:"Ecosystem Audit",steps:["Write the names of the 5 people you spend the most time with.","For each: write one behavior or pattern they consistently model.","Honestly assess: does each person support or challenge the direction you're building toward?","Identify one relationship you want to invest more in.","Identify one environment you need to spend less time in — not permanently, just strategically."]},closer:"You've looked at the ecosystem. Tomorrow: Connection week integration."},sw:{title:"Watu Wanaokuzunguka",opener:"Siku mbili ndani ya wiki ya Uhusiano. Leo tunapanua.",lesson:`Tunaundwa na watu tunaotumia wakati nazo. Neuroni za kioo husababisha bila kujua sisi kupitisha tabia na mifumo ya watu tulio nao mara nyingi zaidi.\n\nKama unatumia muda mwingi karibu na watu wanaokunywa sana — unaelekea mkondo. Si haiwezekani, lakini ni ngumu zaidi.\n\n**Lengo ni kuunganishwa na watu wanaounga mkono unayekuwa — si unayojaribu kumwacha nyuma.**`,reflection:"Angalia watu unaotumia muda mwingi zaidi nazo. Ni tabia gani wanayoionyesha? Hiyo inakugharimu nini?",activity:{title:"Ukaguzi wa Mfumo",steps:["Andika majina ya watu 5 unaotumia wakati mwingi zaidi nazo.","Kwa kila mmoja: andika tabia moja au mfumo wanaouonyesha kwa uthabiti.","Tathmini kwa uaminifu: je, kila mtu anaunga mkono mwelekeo wako?","Tambua uhusiano mmoja unataka kuwekeza zaidi.","Tambua mazingira moja unahitaji kutumia muda mdogo zaidi."]},closer:"Uliangalia mfumo. Kesho: muunganiko wa wiki ya Uhusiano."}},
  {day:26,pillar:"Connection",pillarColor:"#6C3483",en:{title:"Connection Week: Integration",opener:"Four days of Connection. Today we lock in what you've built.",lesson:`Here's what most people discover this week: the loneliness was there before the drinking. The drinking just managed it.\n\nConnection work is not about finding people who support your sobriety. It's about building a life where you're genuinely known.\n\n**You are not built to do this alone. Nobody is.**\n\nAnd asking for real connection is not weakness. It's one of the most structurally sound decisions you can make.\n\nAs you move into Freedom — the final pillar — carry this: the person who gets free is not the one who white-knuckled it alone. They stayed in connection while doing the hard work.`,reflection:"Is there one person who now knows more of the real you than 4 days ago? What changed? If no — what stopped you?",activity:{title:"Connection Week Summary",steps:["Write the name of the person in your inner circle.","Write one honest thing you said (or will say) this week that you normally would have kept back.","Write one relationship you're investing in and what that looks like concretely.","Write one environment you're spending less time in and why.","That's your connection architecture. Keep building it."]},closer:"Connection done. Last pillar: Freedom. Four days. The most important ones."},sw:{title:"Wiki ya Uhusiano: Muunganiko",opener:"Siku nne za Uhusiano. Leo tunafunga ulichojenga.",lesson:`Hapa kuna kitu watu wengi hugundua katika wiki hii: upweke ulikuwepo kabla ya kunywa. Kunywa tu kulikuisimamia.\n\nKazi ya uhusiano si kupata watu watakaounga mkono ulevi wako. Ni kujenga maisha ambapo unajulikana kweli.\n\n**Hujajengwa kufanya hili peke yako. Hakuna anayejengwa hivyo.**`,reflection:"Je, kuna mtu mmoja ambaye sasa anajua zaidi ya wewe wa kweli kuliko alivyojua siku 4 zilizopita?",activity:{title:"Muhtasari wa Wiki ya Uhusiano",steps:["Andika jina la mtu katika mzunguko wako wa ndani.","Andika kitu kimoja cha uaminifu ulichosema wiki hii ambacho kawaida ungehifadhi.","Andika uhusiano mmoja unaowekeza ndani na maoni hilo yanaonekana vipi kwa uhakika.","Andika mazingira au uhusiano mmoja unaotumia muda mdogo ndani.","Hiyo ndiyo usanifu wako wa uhusiano. Endelea kuujenga."]},closer:"Uhusiano umekamilika. Nguzo ya mwisho: Uhuru. Siku nne. Muhimu zaidi."}},
  {day:27,pillar:"Freedom",pillarColor:"#2E4057",en:{title:"Sober vs. Free",opener:"Final pillar. Four days. The most important distinction in this entire program.",lesson:`Go back to Day 3. You mapped your escapes — all of them.\n\nLook at that list now. What's changed? What's increased?\n\nThis is the substitution trap in action.\n\n**Sober and free are not the same thing.**\n\nSober means the alcohol is gone.\n\nFree means you've addressed the root — the wound, the belief, the avoidance pattern — that made escape necessary in the first place.\n\nFree means you can sit in a room with your own thoughts and not need to leave.\n\nFree means you can feel stress, loneliness, shame, anger — and stay present with those feelings without immediately reaching for something.\n\nThis is hard. It's the hardest part of the work. It's also what makes the difference between someone who quits for a few months and someone who is genuinely different.`,reflection:"Look at your Day 3 map. What's changed? What substitutes are you currently running?",activity:{title:"Substitution Check",steps:["Pull out or rewrite your Day 3 escape map.","For each escape, rate the current frequency: More than before / Same / Less / Gone.","Circle anything that's 'More than before.' Those are your current substitutes.","For each: 'When I do this, the feeling I'm avoiding is ___.'","Write the feeling. Don't judge it. Just name it. That naming is the beginning of freedom."]},closer:"You've looked at the substitutes. Tomorrow: what to do about them."},sw:{title:"Mwenye Ulevi dhidi ya Huru",opener:"Nguzo ya mwisho. Siku nne. Tofauti muhimu zaidi katika programu nzima hii.",lesson:`Rudi Siku ya 3. Ulichora njia zako za kutoroka — zote.\n\nAngalia orodha hiyo sasa. Ni nini kilichobadilika? Ni nini kimeongezeka?\n\n**Mwenye ulevi na huru si kitu kimoja.**\n\nMwenye ulevi inamaanisha pombe imeenda.\n\nHuru inamaanisha umeshughulikia mzizi — jeraha, imani, mfumo wa kuepuka — ambao ulitfanya kutoroka kuwe muhimu kwanza.\n\nHuru inamaanisha unaweza kukaa katika chumba na mawazo yako mwenyewe bila kuhitaji kutoka.`,reflection:"Angalia ramani yako ya Siku ya 3. Ni nini kilichobadilika? Ni uingizwaji gani unaoufanya sasa?",activity:{title:"Ukaguzi wa Uingizwaji",steps:["Toa au andika upya ramani yako ya kutoroka ya Siku ya 3.","Kwa kila kutoroka, pima mzunguko wa sasa: Zaidi kuliko kabla / Sawa / Kidogo / Imeenda.","Zungushia chochote ambacho ni 'Zaidi kuliko kabla.'","Kwa kila kimoja: 'Ninapofanya hili, hisia ninayoepuka ni ___.'","Andika hisia. Usihukumu. Iiite tu."]},closer:"Uliangalia uingizwaji. Kesho: nini cha kufanya kuhusu hilo."}},
  {day:28,pillar:"Freedom",pillarColor:"#2E4057",en:{title:"Sitting With It",opener:"The hardest skill in this work. The one that makes everything else possible.",lesson:`Distress tolerance: the capacity to experience uncomfortable emotions without immediately acting to relieve them.\n\nMost people have very low distress tolerance. Not because they're weak — because they were never taught how to develop it.\n\nHere's what happens when someone begins to develop it:\n\nThe craving comes. You notice it. You don't act immediately. You stay with it — 60 seconds, 5 minutes. The craving passes. Because cravings are waves, not permanent states.\n\nOver weeks, two things happen:\n1. The capacity to tolerate discomfort increases.\n2. The brain learns that discomfort will pass — it doesn't require action to survive.\n\n**You cannot think your way to distress tolerance. You have to practice it.**\n\n10 minutes. Next time a craving arrives — don't act on it for 10 minutes. Just stay with it. Most cravings peak within 20 minutes and subside.`,reflection:"When was the last time you sat with an uncomfortable feeling without immediately reaching for something?",activity:{title:"Practice Distress Tolerance",steps:["Today, identify one moment of genuine emotional discomfort.","When it arrives: don't act on it for 10 minutes. Set a timer.","During 10 minutes: breathe normally. Notice where you feel it in your body. Name the emotion.","After 10 minutes: write what happened. Did it intensify? Did it pass?","You just practiced freedom. One minute at a time."]},closer:"That practice — repeated — is how freedom is built."},sw:{title:"Kukaa Nazo",opener:"Ujuzi mgumu zaidi katika kazi hii. Unaofanya kila kitu kingine uwezekane.",lesson:`Uvumilivu wa msongo: uwezo wa kupitia hisia za usumbufu bila mara moja kutenda kuziondoa.\n\nWengi wetu tuna uvumilivu mdogo sana wa msongo. Si kwa sababu ni dhaifu — kwa sababu hawakufundishwa kamwe jinsi ya kuukuza.\n\nHapa kuna kinachotokea mtu anapokuanza kuukuza:\n\nKutamani kunakuja. Anaona. Hatendi mara moja. Anakaa nazo. Kutamani kupita. Kwa sababu kutamani ni mawimbi, si hali za kudumu.\n\n**Huwezi kufikiri njia yako hadi uvumilivu wa msongo. Lazima uufanye mazoezi.**`,reflection:"Ni lini mara ya mwisho ulikaa na hisia ya usumbufu bila mara moja kufikia kitu cha kuifanya isimame?",activity:{title:"Fanya Mazoezi ya Uvumilivu wa Msongo",steps:["Leo, tambua wakati mmoja wa usumbufu wa kweli wa kihisia.","Ukifika: usitende kwa dakika 10. Weka kipindi.","Wakati wa dakika 10: pumua kawaida. Angalia unaihisi wapi mwilini. Taja hisia.","Baada ya dakika 10: andika kilichotokea.","Umefanya mazoezi ya uhuru. Dakika moja kwa wakati mmoja."]},closer:"Mazoezi hayo — yakipowtwa — ndiyo jinsi uhuru unavyojengwa."}},
  {day:29,pillar:"Freedom",pillarColor:"#2E4057",en:{title:"What Freedom Actually Looks Like",opener:"One day from the end. Today we define the destination.",lesson:`Freedom is not the absence of craving. People who have done years of this work still have moments when the trigger hits and the pull is real.\n\nFreedom is not the absence of difficulty. Hard days still happen.\n\n**Freedom is the capacity to face those things without needing to escape from them.**\n\nIt's a Tuesday evening when everything is difficult — and instead of reaching for the escape hatch, you feel it. You breathe. You talk to someone. You sit with it.\n\nNot because you're strong. Because you've practiced.\n\nFreedom is a presence, not an absence. It's the presence of yourself — fully, without the need for chemical management of your experience.\n\n**You are not trying to arrive. You are learning to move in the right direction. And direction, maintained, is everything.**`,reflection:"What would freedom look like in your daily life — not as an abstract concept, but as a concrete reality?",activity:{title:"Define Your Freedom",steps:["Write: 'I am free when ___.' Complete it 10 times. Don't think too hard.","Look at your answers. What conditions appear repeatedly? Those are what freedom means for you.","Write: 'The version of me who is free is someone who ___.' Complete it 5 times.","Write one small, specific thing the free version of you does regularly that the current version doesn't.","Start doing that thing. Today."]},closer:"One more day. Tomorrow is not an ending. It's a measurement."},sw:{title:"Uhuru Unavyoonekana Kweli",opener:"Siku moja kutoka mwisho. Leo tunafafanua marudio.",lesson:`Uhuru si kutokuwepo kwa kutamani. Waliofanya kazi hii kwa miaka bado wana nyakati kichocheo kinapogonga.\n\nUhuru si kutokuwepo kwa ugumu. Siku ngumu bado zinatokea.\n\n**Uhuru ni uwezo wa kukabiliana na mambo hayo bila kuhitaji kutoroka nayo.**\n\nNi Jumanne jioni kila kitu ni gumu — na badala ya kufikia mlango wa kutoroka, unahisi. Unapumua. Unakaa nazo.\n\nSi kwa sababu una nguvu. Kwa sababu umefanya mazoezi.\n\n**Hujaribu kufika. Unajifunza kuhamia upande sahihi. Na mwelekeo, unaodumishwa, ni kila kitu.**`,reflection:"Uhuru utaonekana vipi kweli katika maisha yako ya kila siku — si kama dhana, bali kama ukweli wa kimwili?",activity:{title:"Fafanua Uhuru Wako",steps:["Andika: 'Nina uhuru ninapokuwa ___.' Kimilisha mara 10. Usifikirie sana.","Angalia majibu yako. Ni masharti gani yanayoonekana mara kwa mara?","Andika: 'Toleo langu ambalo ni huru ni mtu ambaye ___.' Kimilisha mara 5.","Andika kitu kimoja kidogo ambacho toleo huru lako hufanya kwa kawaida ambalo toleo la sasa bado halifanyi.","Anza kufanya kitu hicho. Leo."]},closer:"Siku moja zaidi. Kesho si mwisho. Ni kipimo."}},
  {day:30,pillar:"Freedom",pillarColor:"#2E4057",en:{title:"Day 30: Who You Are Now",opener:"Thirty days. You showed up. That matters more than you know.",lesson:`Thirty days ago, you opened this program.\n\nYou've been inside some of the most important questions a person can sit with: Who am I when I'm not performing? What patterns have been running my behavior? What structure supports me? What direction am I moving? Who's alongside me? What does freedom mean for me?\n\nThose questions don't get answered in 30 days. But the asking — done consistently, with honesty — changes something. It changes you.\n\n**You are not the same person who opened this on Day 1.**\n\nThe six pillars don't complete. They deepen. Identity, Clarity, Discipline, Purpose, Connection, Freedom — these are not destinations. They're directions you maintain.\n\nSome days you'll be fully in the work. Some days you'll lose ground. That's not failure — that's the shape of any real change over time.\n\n**Those who finish this guide and keep going are different from those who do it and stop. Keep going.**`,reflection:"Compare yourself now to Day 1. What's different? Not what you wish were different — what actually is.",activity:{title:"Day 30 Integration",steps:["Read your identity statement from Day 8. Write what you'd change or add today.","Read your North Star from Day 20. Does it still hold? Refine if needed.","Read what you're protecting from Day 22. More concrete now?","Write one commitment for the next 30 days — one thing you're continuing.","Write a message to the version of yourself on Day 1. Tell them what you know now."]},closer:"Thirty days done. The work isn't.  This guide gave you the map. If you want someone to walk it with you — that's what coaching is for. Ready to go deeper? Work with Jeremy Makundi: jeremymakundi.github.io"},sw:{title:"Siku ya 30: Wewe Ni Nani Sasa",opener:"Siku thelathini. Ulikuja. Hiyo inafaa zaidi kuliko unavyojua.",lesson:`Siku thelathini zilizopita, ulifungua programu hii.\n\nUmekuwa ndani ya baadhi ya maswali muhimu zaidi ambayo mtu anaweza kukaa nayo.\n\nKuuliza hayo maswali — kufanywa kwa uthabiti, kwa uaminifu — hubadilisha kitu. Hubadilisha mtu.\n\n**Wewe si mtu yule yule aliyefungua hili Siku ya 1.**\n\nNguzo sita hazijakamilika. Zinakua kirefu. Utambulisho, Uwazi, Nidhamu, Kusudi, Uhusiano, Uhuru — hizi si marudio. Ni mwelekeo unaouhifadhi.\n\n**Wanaokamilisha mwongozo huu na kuendelea ni tofauti na wanaofanya na kusimama. Endelea.**`,reflection:"Jilinganishe sasa na Siku ya 1. Ni nini tofauti? Si unatamani iwe tofauti — ni nini kweli.",activity:{title:"Muunganiko wa Siku ya 30",steps:["Soma taarifa yako ya utambulisho kutoka Siku ya 8. Andika ungebadilisha nini leo.","Soma Nyota yako ya Kaskazini kutoka Siku ya 20. Je, bado inashikilia?","Soma unachokinalinda kutoka Siku ya 22. Ni maalum zaidi sasa?","Andika ahadi moja kwa siku 30 zijazo.","Andika ujumbe kwa mtu uliokuwa Siku ya 1."]},closer:"Siku thelathini zimekamilika. Kazi haijakamilika.  Mwongozo huu ulikupa ramani. Ukitaka mtu wa kutembea nayo — hiyo ndiyo kazi ya kocha. Uko tayari kwenda kina zaidi? Fanya kazi na Jeremy Makundi: jeremymakundi.github.io"}}
];

You are speaking to anyone, regardless of gender or age. Speak directly. Straight coach voice. No clinical softness. No hedging.

Philosophy: Educate. Equip. The decision is always theirs to make. Never push, guilt, diagnose, or prescribe.

Your voice: Direct. No "I understand how you feel." No "white-knuckle." No "Real men." No "I know what you're going through." Sharp. Like someone who has done this work themselves.

The 6 pillars: Identity, Clarity, Discipline, Purpose, Connection, Freedom.
The program: 30 days. Streak-based. Self-directed inner work.

Key truths: Alcohol is the door, not the house. Sober and free are not the same thing. The substitution trap is real. This is inner work — not therapy, not AA. The decision is always theirs.

Respond in whatever language the user writes in — English or Swahili. Mix if they mix.

Never: diagnose, prescribe, give medical advice, encourage relapse, shame, or judge.
Always: tell the truth, point to the relevant pillar, give one actionable idea.
Keep it tight — 3-5 sentences unless complexity demands more.

CRITICAL FORMATTING RULE: Never use markdown. No asterisks, no bold (**word**), no bullet points with -, no headers with #. Write in plain sentences and paragraphs only.`;
