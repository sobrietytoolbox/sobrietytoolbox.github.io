function InstallBanner({ lang }) {
  const [show, setShow] = useState(false);
  const [isIOS, setIsIOS] = useState(false);
  const [deferredPrompt, setDeferredPrompt] = useState(null);
  const [dismissed, setDismissed] = useState(false);

  useEffect(() => {
    // Already installed as PWA — don't show
    if (window.matchMedia("(display-mode: standalone)").matches) return;
    // Already dismissed
    if (localStorage.getItem("st_install_dismissed")) return;

    const ios = /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
    setIsIOS(ios);

    if (ios) {
      // Show iOS instructions after 2s
      setTimeout(() => setShow(true), 2000);
    } else {
      // Listen for Android/Chrome install prompt
      const handler = (e) => {
        e.preventDefault();
        setDeferredPrompt(e);
        setTimeout(() => setShow(true), 2000);
      };
      window.addEventListener("beforeinstallprompt", handler);
      return () => window.removeEventListener("beforeinstallprompt", handler);
    }
  }, []);

  const handleInstall = async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === "accepted") {
        localStorage.setItem("st_install_dismissed", "1");
        setShow(false);
      }
    }
  };

  const handleDismiss = () => {
    localStorage.setItem("st_install_dismissed", "1");
    setDismissed(true);
    setShow(false);
  };

  if (!show || dismissed) return null;

  return (
    <div style={{
      position:"fixed", bottom:0, left:0, right:0,
      background:"#1A1814", borderTop:"2px solid #E8541A",
      padding:"16px 20px 28px", zIndex:999,
      fontFamily:"'Sora',sans-serif",
      animation:"slideUp 0.4s ease",
      maxWidth:480, margin:"0 auto",
    }}>
      <style>{`@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}`}</style>

      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:10}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:36,height:36,background:"#E8541A",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <ToolboxIcon size={20}/>
          </div>
          <div>
            <div style={{fontSize:12,fontWeight:700,color:"#F0EBE3",letterSpacing:"0.04em"}}>
              {lang==="en"?"Add to Home Screen":"Ongeza kwenye Skrini ya Nyumbani"}
            </div>
            <div style={{fontSize:10,color:"#9A9088",marginTop:2}}>
              {lang==="en"?"Never lose your streak":"Usipoteze mfululizo wako"}
            </div>
          </div>
        </div>
        <button onClick={handleDismiss} style={{background:"none",border:"none",color:"#9A9088",fontSize:18,cursor:"pointer",padding:"0 4px",lineHeight:1}}>×</button>
      </div>

      {isIOS ? (
        <div style={{background:"#0C0C0C",padding:"12px 14px",borderLeft:"3px solid #E8541A"}}>
          <div style={{fontSize:12,color:"#F0EBE3",lineHeight:1.7}}>
            {lang==="en"
              ? <>Tap the <strong style={{color:"#E8541A"}}>Share</strong> button <span style={{fontSize:14}}>⬆</span> at the bottom of your browser, then tap <strong style={{color:"#E8541A"}}>"Add to Home Screen"</strong></>
              : <>Bonyeza kitufe cha <strong style={{color:"#E8541A"}}>Shiriki</strong> <span style={{fontSize:14}}>⬆</span> chini ya kivinjari chako, kisha bonyeza <strong style={{color:"#E8541A"}}>"Ongeza kwenye Skrini ya Nyumbani"</strong></>
            }
          </div>
        </div>
      ) : (
        <button onClick={handleInstall} style={{
          width:"100%", background:"#E8541A", color:"#fff", border:"none",
          padding:"13px", fontSize:13, fontWeight:700, cursor:"pointer",
          fontFamily:"Sora,sans-serif", letterSpacing:"0.05em",
        }}>
          {lang==="en"?"INSTALL APP — IT'S FREE":"SAKINISHA PROGRAMU — NI BURE"}
        </button>
      )}
    </div>
  );
}

// INSTALL NUDGE — shown on Home after Day 3 streak

function InstallNudge({ lang, C, streak }) {
  const [show, setShow] = useState(true);
  const [isIOS] = useState(() => /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream);
  const [deferredPrompt, setDeferredPrompt] = useState(null);

  useEffect(() => {
    const handler = (e) => { e.preventDefault(); setDeferredPrompt(e); };
    window.addEventListener("beforeinstallprompt", handler);
    return () => window.removeEventListener("beforeinstallprompt", handler);
  }, []);

  const handleInstall = async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === "accepted") {
        localStorage.setItem("st_install_dismissed", "1");
        setShow(false);
      }
    }
  };

  const handleDismiss = () => {
    localStorage.setItem("st_install_dismissed", "1");
    setShow(false);
  };

  if (!show) return null;

  return (
    <div style={{
      background:C.s1, border:`1px solid ${C.orange}44`,
      borderLeft:`3px solid ${C.orange}`,
      padding:"14px 16px", marginBottom:20,
      display:"flex", alignItems:"flex-start", gap:12,
    }}>
      <div style={{fontSize:20, flexShrink:0}}>📲</div>
      <div style={{flex:1}}>
        <div style={{fontSize:12, fontWeight:700, color:C.text, marginBottom:4}}>
          {lang==="en"
            ? `You're on a ${streak}-day streak. Don't lose it.`
            : `Una mfululizo wa siku ${streak}. Usipoteze.`}
        </div>
        <div style={{fontSize:11, color:C.mid, lineHeight:1.6, marginBottom:10}}>
          {isIOS
            ? (lang==="en"
                ? <>Tap <strong style={{color:C.orange}}>Share ⬆</strong> then <strong style={{color:C.orange}}>"Add to Home Screen"</strong> so the app is always one tap away.</>
                : <>Bonyeza <strong style={{color:C.orange}}>Shiriki ⬆</strong> kisha <strong style={{color:C.orange}}>"Ongeza kwenye Skrini ya Nyumbani"</strong> ili programu iwe jibu moja kila wakati.</>)
            : (lang==="en"
                ? "Install the app so it's always one tap away — no browser needed."
                : "Sakinisha programu ili iwe jibu moja kila wakati — hakuna kivinjari kinachohitajika.")
          }
        </div>
        <div style={{display:"flex", gap:8}}>
          {!isIOS && (
            <button onClick={handleInstall} style={{
              background:C.orange, color:"#fff", border:"none",
              padding:"8px 14px", fontSize:11, fontWeight:700,
              cursor:"pointer", fontFamily:"Sora,sans-serif", letterSpacing:"0.04em",
            }}>
              {lang==="en"?"INSTALL NOW":"SAKINISHA SASA"}
            </button>
          )}
          <button onClick={handleDismiss} style={{
            background:"transparent", color:C.dim, border:`1px solid ${C.border}`,
            padding:"8px 14px", fontSize:11, cursor:"pointer", fontFamily:"Sora,sans-serif",
          }}>
            {lang==="en"?"Not now":"Si sasa"}
          </button>
        </div>
      </div>
    </div>
  );
}

              {lang==="en"

            </div>
            <div style={{fontSize:13,color:C.mid,lineHeight:1.75,marginBottom:20}}>
              {lang==="en"
                ?"30 days of self-directed work is the foundation. The next level is 1-on-1 coaching with Jeremy Makundi — Founder of FlipTheScript™, sobriety coach and alcohol educator — where the framework meets your specific life, your patterns, your next move."
                :"Siku 30 za kujielekeza ni msingi. Hatua inayofuata ni kazi ya moja kwa moja na Jeremy Makundi — Mwanzilishi wa FlipTheScript™, kocha wa ulevi na mwelimishaji wa pombe — ambapo mfumo unakutana na maisha yako maalum."}
            </div>
          </div>

          <a href="https://jeremymakundi.github.io" target="_blank" rel="noopener noreferrer"

            {lang==="en"?"BOOK A CONSULTATION WITH JEREMY →":"PANGA USHAURI NA JEREMY →"}
          </a>

          <button onClick={()=>{setShowSummary(false);setTab("home");}}
            style={{width:"100%",background:"transparent",border:`1px solid ${C.border}`,color:C.mid,padding:"13px 16px",fontSize:13,cursor:"pointer",fontFamily:"Sora,sans-serif"}}>
            {lang==="en"?"Return to the Guide":"Rudi kwa Mwongozo"}
          </button>
        </div>
      </div>

  }

  return (
    <div className="app">
      <style>{appCss}</style>

      {/* ── HOME ── */}
      {tab==="home" && (
        <div className="fade" style={{padding:"24px 20px 100px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:24}}>
            <div style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={onBackToLanding}>
              <div style={{background:C.orange,width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center"}}><ToolboxIcon size={20}/></div>
              <div>
                <div style={{fontSize:11,fontWeight:600,letterSpacing:"0.1em"}}>SOBRIETY TOOLBOX</div>
                <div style={{fontSize:9,color:C.dim,letterSpacing:"0.1em"}}>FLIPTHESCRIPT™</div>
              </div>
            </div>
            <button onClick={()=>setLang(l=>l==="en"?"sw":"en")}
              style={{background:C.s2,border:`1px solid ${C.border}`,color:C.mid,padding:"5px 12px",fontSize:11,cursor:"pointer",fontFamily:"Sora,sans-serif"}}>
              {t.switchLang}
            </button>
          </div>

          {/* ── PROGRESS RING HERO ── */}
          {(() => {
            const pct = completedDays / 30;
            const R = 54;
            const CIRC = 2 * Math.PI * R;
            const dash = pct * CIRC;
            const gap = CIRC - dash;
            // Pillar progress
            const pillars = ["Identity","Clarity","Discipline","Purpose","Connection","Freedom"];
            const pillarData = pillars.map(p => {
              const days = DAYS.filter(d => d.pillar === p);
              const done = days.filter(d => dayData[d.day]).length;
              return { p, done, total: days.length, pct: done / days.length };
            });
            return (
              <div style={{marginBottom:24}}>
                {/* Ring + stats row */}
                <div style={{display:"flex",alignItems:"center",gap:20,background:C.s1,border:`1px solid ${C.border}`,padding:"20px 20px",marginBottom:16}}>
                  {/* SVG Ring */}
                  <div style={{position:"relative",flexShrink:0}}>
                    <svg width={130} height={130} viewBox="0 0 130 130">
                      {/* Track */}
                      <circle cx="65" cy="65" r={R} fill="none" stroke={C.border} strokeWidth="10"/>
                      {/* Progress arc */}
                      <circle cx="65" cy="65" r={R} fill="none"
                        stroke={completedDays===30 ? "#6aaa7a" : C.orange}
                        strokeWidth="10"
                        strokeLinecap="round"
                        strokeDasharray={`${dash} ${gap}`}
                        strokeDashoffset={CIRC * 0.25}
                        style={{transition:"stroke-dasharray 0.8s ease"}}
                      />
                      {/* Centre text */}
                      <text x="65" y="58" textAnchor="middle" fill={C.text} fontSize="26" fontWeight="700" fontFamily="Sora,sans-serif">{completedDays}</text>
                      <text x="65" y="74" textAnchor="middle" fill={C.dim} fontSize="10" fontFamily="Sora,sans-serif">OF 30</text>
                      <text x="65" y="88" textAnchor="middle" fill={C.orange} fontSize="9" fontFamily="Sora,sans-serif" letterSpacing="1">{lang==="en"?"DAYS":"SIKU"}</text>
                    </svg>
                  </div>
                  {/* Stats */}
                  <div style={{flex:1}}>
                    <div style={{fontSize:10,letterSpacing:"0.15em",color:C.orange,marginBottom:6}}>{t.streak.toUpperCase()}</div>
                    <div style={{fontSize:36,fontWeight:700,lineHeight:1,marginBottom:2}}>{streak}</div>
                    <div style={{fontSize:11,color:C.dim,marginBottom:14}}>{lang==="en"?"day streak":"siku mfululizo"}</div>
                    <div style={{fontSize:11,color:C.mid}}>
                      {completedDays===30
                        ? (lang==="en"?"Guide complete 🔓":"Mwongozo kamili 🔓")

                    </div>
                  </div>
                </div>

                {/* Progress bar */}
                <div style={{marginBottom:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:10,letterSpacing:"0.12em",color:C.dim}}>{lang==="en"?"OVERALL PROGRESS":"MAENDELEO"}
                  </div>
                  <div style={{fontSize:11,color:C.orange,fontWeight:600}}>{Math.round(pct*100)}%</div>
                </div>
                <div style={{height:6,background:C.border,borderRadius:3,overflow:"hidden",marginBottom:16}}>
                  <div style={{height:"100%",width:`${pct*100}%`,background:completedDays===30?"#6aaa7a":C.orange,borderRadius:3,transition:"width 0.8s ease"}}/>
                </div>

                {/* Per-pillar mini bars */}
                <div style={{display:"flex",flexDirection:"column",gap:7}}>
                  {pillarData.map(({p,done,total,pct:pp})=>(
                    <div key={p} style={{display:"flex",alignItems:"center",gap:10}}>
                      <div style={{width:80,fontSize:10,color:C.dim,flexShrink:0}}>{p.toUpperCase()}</div>
                      <div style={{flex:1,height:4,background:C.border,borderRadius:2,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${pp*100}%`,background:pp===1?"#6aaa7a":C.orange,borderRadius:2,transition:"width 0.8s ease"}}/>
                      </div>
                      <div style={{width:28,fontSize:10,color:pp===1?"#6aaa7a":C.mid,textAlign:"right",flexShrink:0}}>{done}/{total}</div>
                    </div>
                  ))}
                </div>
              </div>
            );
          })()}

          {/* ── INSTALL NUDGE — shows after Day 3 if not already installed ── */}
          {completedDays >= 3 && completedDays < 30 &&
           !window.matchMedia("(display-mode: standalone)").matches &&
           !localStorage.getItem("st_install_dismissed") && (
            <InstallNudge lang={lang} C={C} streak={streak}/>

          {/* Today */}
          {currentDay<=30 && (
            <div style={{marginBottom:20}}>
              <div style={{fontSize:10,letterSpacing:"0.15em",color:C.dim,marginBottom:8}}>{lang==="en"?"TODAY":"LEO"}</div>
              <div className="dcrd" style={{borderColor:`${C.orange}44`,borderLeft:`3px solid ${C.orange}`}}
                onClick={()=>{setActiveDay(currentDay);setSection("lesson");setTab("dayview");}}>
                <div style={{width:44,height:44,background:C.orange,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontSize:16,fontWeight:700,color:"#fff"}}>{currentDay}</span>
                </div>
                <div style={{flex:1}}>
                  <div style={{fontSize:10,color:C.mid,marginBottom:2}}>{DAYS[currentDay-1]?.pillar}</div>
                  <div style={{fontSize:15,fontWeight:600}}>{DAYS[currentDay-1]?.[lang]?.title}</div>
                </div>
                <span style={{color:C.dim,fontSize:18}}>›</span>
              </div>
            </div>
          )}

          {completedDays===30 && (
            <div style={{background:"#0A1A0C",border:`1px solid ${C.green}`,padding:"20px",marginBottom:20,textAlign:"center"}}>
              <div style={{fontSize:24,marginBottom:8}}>🔓</div>
              <div className="serif" style={{fontSize:18,color:"#6aaa7a",marginBottom:6}}>{lang==="en"?"30 Days Complete":"Siku 30 Zimekamilika"}</div>
              <div style={{fontSize:13,color:C.mid,marginBottom:14}}>{lang==="en"?"The work continues.":"Kazi inaendelea."}</div>
              <button className="pbtn" onClick={()=>{
                setSummaryText("");
                setSummaryLoading(true);
                setShowSummary(true);
                setTimeout(()=>generateSummary(), 100);
              }}>
                {lang==="en"?"View My 30-Day Summary →":"Tazama Muhtasari Wangu →"}
              </button>
            </div>
          )}

          <div style={{background:C.s1,border:`1px solid ${C.border}`,padding:"18px",marginBottom:20}}>
            <div style={{fontSize:10,letterSpacing:"0.15em",color:C.orange,marginBottom:8}}>THE PHILOSOPHY</div>
            <p className="serif" style={{fontSize:14,lineHeight:1.8,color:C.mid,fontStyle:"italic"}}>
              {lang==="en"?'"Alcohol should not be an option."':'"Pombe haipaswi kuwa chaguo."'}

        </div>

                    <div style={{fontSize:14,fontWeight:600,color:locked?C.dim:C.text}}>{d[lang].title}</div>
                  </div>
                  {!locked&&<span style={{color:C.dim,fontSize:16}}>›</span>}
                  {locked&&<span style={{color:C.dim,fontSize:14}}>🔒</span>}
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── DAY VIEW ── */}
      {tab==="dayview" && day && dl && (
        <div className="fade" style={{padding:"20px 20px 100px"}}>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
            {t.back}
          </button>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <div style={{width:48,height:48,background:PILLAR_COLORS[day.pillar]||C.s2,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <div style={{fontSize:9,color:"rgba(255,255,255,.6)",letterSpacing:"0.1em"}}>{t.day.toUpperCase()}</div>
              <div style={{fontSize:20,fontWeight:700,color:"#fff",lineHeight:1}}>{day.day}</div>
            </div>
            <div>
              <div style={{fontSize:10,color:PILLAR_COLORS[day.pillar]||C.dim,letterSpacing:"0.1em",marginBottom:2}}>{day.pillar.toUpperCase()}</div>
              <h2 className="serif" style={{fontSize:19,lineHeight:1.2}}>{dl.title}</h2>
            </div>
            {dayData[day.day]&&<span className="badge-g" style={{marginLeft:"auto"}}>✓</span>}
          </div>
          <div style={{display:"flex",borderBottom:`1px solid ${C.border}`,marginBottom:20}}>
            {["lesson","reflect","activity"].map(s=>(
              <button key={s} className={`ltab${section===s?" on":""}`} onClick={()=>setSection(s)}>

              </button>
            ))}
          </div>

          {section==="lesson" && (
            <div>
              <div style={{background:C.s2,borderLeft:`3px solid ${PILLAR_COLORS[day.pillar]||C.orange}`,padding:"14px 16px",marginBottom:20}}>
                <div style={{fontSize:10,color:C.mid,letterSpacing:"0.1em",marginBottom:6}}>{t.opener.toUpperCase()}</div>
                <p className="serif" style={{fontSize:14,lineHeight:1.7,fontStyle:"italic"}}>{dl.opener}</p>
              </div>
              <div className="prose">
                {dl.lesson.split("\n\n").map((p,i)=>(
                  <p key={i} dangerouslySetInnerHTML={{__html:p.replace(/\*\*(.*?)\*\*/g,"<strong>$1</strong>")}}/>
                ))}
              </div>
              <button className="pbtn" style={{marginTop:24}} onClick={()=>setSection("reflect")}>
                {lang==="en"?"Reflect →":"Tafakari →"}
              </button>
            </div>
          )}

          {section==="reflect" && (
            <div>
              <div style={{background:C.s2,border:`1px solid ${C.border}`,padding:"18px",marginBottom:16}}>
                <p className="serif" style={{fontSize:15,lineHeight:1.8,fontStyle:"italic"}}>"{dl.reflection}"</p>
              </div>
              <p style={{fontSize:12,color:C.dim,marginBottom:12}}>{lang==="en"?"Private. Clears when you leave.":"Faragha. Inafutwa unapoondoka."}</p>
              <textarea value={journalText} onChange={e=>saveReflection(activeDay, e.target.value)}
                placeholder={lang==="en"?"Write honestly...":"Andika kwa uaminifu, kaka..."} rows={8}/>
              <button className="pbtn" style={{marginTop:12}} onClick={()=>setSection("activity")}>
                {lang==="en"?"Continue to Activity →":"Endelea kwenye Shughuli →"}
              </button>
            </div>
          )}

          {section==="activity" && (
            <div>
              <div style={{fontSize:10,letterSpacing:"0.15em",color:C.orange,marginBottom:6}}>
                {lang==="en"?"TODAY'S ACTIVITY":"SHUGHULI YA LEO"}
              </div>
              <h3 className="serif" style={{fontSize:18,marginBottom:16}}>{dl.activity.title}</h3>
              {dl.activity.steps.map((s,i)=>(
                <div key={i} className="step">
                  <div style={{fontSize:10,color:C.orange,marginBottom:4,letterSpacing:"0.1em"}}>STEP 0{i+1}</div>
                  {s}
                </div>
              ))}
              <div style={{background:C.s1,borderLeft:`3px solid ${PILLAR_COLORS[day.pillar]||C.orange}`,padding:"14px 16px",margin:"20px 0"}}>
                <div style={{fontSize:10,color:C.mid,letterSpacing:"0.1em",marginBottom:6}}>{t.closer.toUpperCase()}</div>
                <p className="serif" style={{fontSize:13,lineHeight:1.7,fontStyle:"italic",color:C.mid}}>{dl.closer}</p>
              </div>
              <div style={{background:C.s1,border:`1px solid ${C.border}`,padding:"14px",marginBottom:20}}>
                <p style={{fontSize:12,color:C.mid,marginBottom:8}}>{lang==="en"?"Stuck? Ask Toolbox.":"Umekwama? Uliza Toolbox."}</p>
                <button className="gbtn" onClick={()=>setTab("ask")}>{lang==="en"?"Ask Toolbox →":"Uliza Toolbox →"}</button>
              </div>
              {!dayData[day.day] ? (
                <button className="pbtn" onClick={()=>{
                  completeDay(day.day);
                  if (Number(day.day) !== 30) setTab("learn");
                }}>
                  {t.markDone}
                </button>
              ) : (
                <div style={{textAlign:"center",padding:"12px 0"}}>
                  <span className="badge-g" style={{fontSize:13,padding:"6px 16px"}}>✓ {t.done}</span>
                  {day.day < 30 ? (
                    <button className="sbtn" onClick={()=>{setActiveDay(day.day+1);setSection("lesson");}}>
                      {lang==="en"?`Day ${day.day+1} →`:`Siku ${day.day+1} →`}
                    </button>
                  ) : (
                    <>
                      <button className="pbtn" style={{marginTop:12}} onClick={()=>{
                        setSummaryText("");
                        setSummaryLoading(true);
                        setShowSummary(true);
                        setTimeout(()=>generateSummary(), 100);
                      }}>
                        {lang==="en"?"View My 30-Day Summary →":"Tazama Muhtasari Wangu →"}
                      </button>
                    </>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* ── TOOLS ── */}
      {tab==="tools" && (
        <div className="fade" style={{padding:"24px 20px 100px"}}>
          {!activeTool ? (
            <>
              <div style={{fontSize:10,letterSpacing:"0.15em",color:C.orange,marginBottom:4}}>QUICK TOOLS</div>
              <h2 className="serif" style={{fontSize:22,marginBottom:20}}>{t.toolsTitle}</h2>
              {[
                {key:"breathe",e:"💨",title:lang==="en"?"4-7-8 Breathing":"Pumzi 4-7-8",sub:lang==="en"?"For when urges hit":"Wakati hamu inakuja"},
                {key:"journal",e:"📝",title:lang==="en"?"Reflection Journal":"Jarida la Tafakari",sub:lang==="en"?"Private. Never saved.":"Faragha. Haihifadhiwi."},
              ].map(tool=>(
                <div key={tool.key} style={{background:C.s1,border:`1px solid ${C.border}`,padding:"18px",cursor:"pointer",marginBottom:10,display:"flex",alignItems:"center",gap:14}}
                  onClick={()=>setActiveTool(tool.key)}>
                  <span style={{fontSize:26}}>{tool.e}</span>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:600,marginBottom:2}}>{tool.title}</div>
                    <div style={{fontSize:12,color:C.mid}}>{tool.sub}</div>
                  </div>
                  <span style={{color:C.dim,fontSize:18}}>›</span>
                </div>
              ))}
            </>
          ) : (
            <>
              <button className="bbtn" onClick={()=>setActiveTool(null)}>
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" width="16" height="16"><path d="M19 12H5M5 12l7 7M5 12l7-7"/></svg>
                {t.back}
              </button>
              {activeTool==="breathe" && (
                <div>
                  <h3 className="serif" style={{fontSize:20,marginBottom:16}}>{lang==="en"?"4-7-8 Breathing":"Pumzi 4-7-8"}</h3>
                  <p style={{fontSize:13,color:C.mid,marginBottom:20,lineHeight:1.6}}>
                    {lang==="en"?"Activates your parasympathetic nervous system. Use when an urge hits.":"Inaamsha mfumo wako wa neva wa parasympathetic."}
                  </p>
                  {breathePhase==="idle" ? (
                    <div style={{textAlign:"center"}}>
                      <div style={{display:"flex",justifyContent:"center",gap:28,marginBottom:28}}>
                        {BPHASES.map(p=>(
                          <div key={p.key} style={{textAlign:"center"}}>
                            <div style={{fontSize:24,fontWeight:700,color:p.color}}>{p.dur}s</div>
                            <div style={{fontSize:11,color:C.dim}}>{p.label}</div>
                          </div>
                        ))}
                      </div>
                      <button onClick={()=>{setBreathePhase("inhale");setBreatheCount(4);setBreatheCycles(0);}}
                        style={{background:C.orange,color:"#fff",border:"none",padding:"12px 36px",fontSize:14,cursor:"pointer",fontFamily:"Sora,sans-serif",fontWeight:600}}>
                        {lang==="en"?"Begin":"Anza"}
                      </button>
                    </div>
                  ) : (
                    <div style={{textAlign:"center"}}>
                      <div style={{position:"relative",width:140,height:140,margin:"0 auto 20px"}}>
                        <svg width="140" height="140" viewBox="0 0 140 140">
                          <circle cx="70" cy="70" r={R} fill="none" stroke={C.border} strokeWidth="5"/>
                          <circle cx="70" cy="70" r={R} fill="none" stroke={bpd?.color||C.orange} strokeWidth="5" strokeLinecap="round"
                            strokeDasharray={circ} strokeDashoffset={circ*(1-bprog)}
                            style={{transform:"rotate(-90deg)",transformOrigin:"center",transition:"stroke-dashoffset 1s linear"}}/>
                        </svg>
                        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                          <span style={{fontSize:36,fontWeight:700}}>{breatheCount}</span>
                          <span style={{fontSize:11,color:bpd?.color,letterSpacing:"0.1em",textTransform:"uppercase"}}>{bpd?.label}</span>
                        </div>
                      </div>
                      <p style={{color:C.dim,fontSize:12,marginBottom:12}}>{lang==="en"?`Cycles: ${breatheCycles}`:`Mizunguko: ${breatheCycles}`}</p>
                      <button onClick={()=>{setBreathePhase("idle");clearTimeout(breatheTimer.current);}}
                        style={{background:"transparent",color:C.mid,border:`1px solid ${C.border}`,padding:"8px 20px",fontSize:12,cursor:"pointer",fontFamily:"Sora,sans-serif"}}>
                        {lang==="en"?"Stop":"Simama"}
                      </button>
                    </div>
                  )}
                </div>
              )}
              {activeTool==="journal" && (
                <div>
                  <h3 className="serif" style={{fontSize:20,marginBottom:8}}>{lang==="en"?"Reflection Journal":"Jarida la Tafakari"}</h3>
                  <p style={{fontSize:12,color:C.dim,marginBottom:16}}>{lang==="en"?"Write freely. Clears when you leave.":"Andika kwa uhuru. Inafutwa unapoondoka."}</p>
                  <textarea value={journalText} onChange={e=>saveReflection(activeDay, e.target.value)}
                    placeholder={lang==="en"?"Start writing...":"Anza kuandika, kaka..."} rows={14}/>
                </div>
              )}
            </>
          )}
        </div>
      )}

      {/* ── ASK (TOOLBOX AI) ── */}
      {tab==="ask" && (
        <div className="fade" style={{display:"flex",flexDirection:"column",height:"100vh",padding:"20px 20px 0"}}>
          <div style={{marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
              <div style={{width:28,height:28,background:C.orange,display:"flex",alignItems:"center",justifyContent:"center"}}><ToolboxIcon size={16}/></div>
              <div>
                <div style={{fontSize:10,letterSpacing:"0.15em",color:C.orange}}>AI GUIDE</div>
                <h2 className="serif" style={{fontSize:18}}>Toolbox</h2>
              </div>
            </div>
            <p style={{fontSize:12,color:C.mid}}>{lang==="en"?"Straight answers. No fluff.":"Majibu ya moja kwa moja. Bila kujaza."}</p>
          </div>
          <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:14,paddingBottom:16}}>
            {messages.map((m,i)=>(
              <div key={i} style={{display:"flex",alignItems:"flex-end",gap:8,justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                {m.role==="assistant"&&(
                  <div style={{width:26,height:26,background:C.orange,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><ToolboxIcon size={14}/></div>
                )}
                <div className={m.role==="user"?"cu":"ca"}>{m.role==="assistant" ? renderFormatted(m.content) : m.content}</div>
              </div>
            ))}
            {aiLoading&&(
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:26,height:26,background:C.s1,border:`1px solid ${C.border}`,display:"flex",alignItems:"center",justifyContent:"center"}}><ToolboxIcon size={14}/></div>
                <span style={{color:C.dim,fontSize:13,fontStyle:"italic"}}>{t.thinking}</span>
              </div>
            )}
            <div ref={msgEnd}/>
          </div>
          <div style={{borderTop:`1px solid ${C.border}`,paddingTop:10,paddingBottom:90,display:"flex",gap:8}}>
            <textarea rows={2} placeholder={t.placeholder} value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMsg();}}}/>
            <button onClick={sendMsg} disabled={aiLoading}
              style={{background:C.orange,color:"#fff",border:"none",padding:"0 16px",fontSize:13,fontWeight:600,cursor:"pointer",opacity:aiLoading?.5:1,flexShrink:0,fontFamily:"Sora,sans-serif"}}>
              {t.send}
            </button>
          </div>
        </div>
      )}

      {/* TAB BAR */}
      <nav className="tbar">
        {[{k:"home",l:t.home},{k:"learn",l:t.learn},{k:"tools",l:t.tools},{k:"ask",l:t.ask}].map(item=>(
          <button key={item.k} className={`tbn${activeTab===item.k?" on":""}`}
            onClick={()=>{setTab(item.k);if(item.k!=="dayview")setActiveDay(null);}}>
            {icons[item.k]}
            {item.l}
          </button>
        ))}
      </nav>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// ROOT — Landing + transition into App
// ─────────────────────────────────────────────────────────────────────────────
function Root() {
  const DATA_VERSION = "v1";
  const [dayData, setDayData] = useState(() => {
    try {
      const saved = JSON.parse(localStorage.getItem("st_days")||"{}");
      const ver = localStorage.getItem("st_version");
      if (ver !== DATA_VERSION) localStorage.setItem("st_version", DATA_VERSION);
      return saved;
    } catch { return {}; }
  });
  const [streak, setStreak] = useState(() => {
    try { return parseInt(localStorage.getItem("st_streak")||"0"); } catch { return 0; }
  });

  // If user has started (any day saved), go straight to app — no landing page
  const hasStarted = Object.keys(dayData).length > 0 || !!localStorage.getItem("st_started");

  const [screen, setScreen] = useState(hasStarted ? "app" : "landing");
  const [lang, setLang] = useState(() => localStorage.getItem("st_lang") || "en");
  const [theme, setTheme] = useState(() => localStorage.getItem("st_theme") || "dark");

  // Persist lang + theme choices
  const setLangP = (v) => { setLang(v); try { localStorage.setItem("st_lang", v); } catch {} };
  const setThemeP = (v) => { setTheme(v); try { localStorage.setItem("st_theme", v); } catch {} };

  const handleEnter = () => {
    try { localStorage.setItem("st_started", "1"); } catch {}
    setScreen("entering");
    setTimeout(() => setScreen("app"), 600);
  };

  const appBg = theme === "light" ? "#FAFAF8" : "#0C0C0C";

  const rootCss = `
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { background: #FAFAF8; overscroll-behavior: none; }
    .entering { animation: slide-out .5s ease forwards; }
    .app-enter { animation: slide-in .5s ease forwards; }
    @keyframes slide-out { from{opacity:1;transform:translateY(0);} to{opacity:0;transform:translateY(-24px);} }
    @keyframes slide-in { from{opacity:0;transform:translateY(20px);} to{opacity:1;transform:translateY(0);} }
  `;

  return (
    <>
      <style>{rootCss}</style>
      {screen === "landing" && <LandingPage onEnter={handleEnter} theme={theme} setTheme={setThemeP} />}
      {screen === "entering" && (
        <div className="entering">
          <LandingPage onEnter={()=>{}} theme={theme} setTheme={setThemeP} />
        </div>
      )}
      {screen === "app" && (
        <div className={hasStarted ? "" : "app-enter"} style={{background:appBg}}>
          <App lang={lang} setLang={setLangP} dayData={dayData} setDayData={setDayData} streak={streak} setStreak={setStreak} onBackToLanding={()=>setScreen("landing")} theme={theme} />
        </div>
      )}
    </>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<Root />);
  </script>
</body>
</html>
